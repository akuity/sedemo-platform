apiVersion: resource.k8s.io/v1beta1
kind: ResourceClaimTemplate
metadata:
  name: gpu-claim-template-nvidia
spec:
  spec:
    devices:
      requests:
      - name: single-gpu
        deviceClassName: ''
        firstAvailable:
          - deviceClassName: gpu.nvidia.com
            allocationMode: ExactCount
            count: 1
            name: single-gpu