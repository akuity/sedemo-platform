apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: bogus.stable.example.com
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  group: stable.example.com
  versions:
    - name: v1beta
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                message:
                  type: string
                replicas:
                  type: integer
