apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: argocd-apps
  namespace: argocd
spec:
  generators:
  - git:
      repoURL: https://github.com/akuity/sedemo-platform
      revision: HEAD
      directories:
      - path: apps/*/argocd
  template:
    metadata:
      name: 'argocd-{{path[1]}}'
    spec:
      # Uses default project to avoid a bootstrap chicken-and-egg: each app's
      # AppProject lives inside the argocd/ path this Application syncs, so the
      # project can't exist before the Application is created.
      project: default
      source:
        repoURL: https://github.com/akuity/sedemo-platform
        targetRevision: HEAD
        path: '{{path}}'
        directory:
          recurse: true
      destination:
        name: in-cluster
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
