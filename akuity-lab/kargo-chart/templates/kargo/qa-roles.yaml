---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: release-team
  namespace: {{ .Values.application.name }}
  annotations:
    kargo.akuity.io/description: Promote to Staging only
    rbac.kargo.akuity.io/claims: '{"groups":["sedemo-release"]}'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: release-team
  namespace: {{ .Values.application.name }}
rules:
- apiGroups:
  - kargo.akuity.io
  resources:
  - promotions
  verbs:
  - create
  - patch
  - update
- apiGroups:
  - kargo.akuity.io
  resources:
  - 'stages'
  verbs:
  - promote
  # Limit promotions to a subset of Stages
  resourceNames:
  - 'staging'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: release-team
  namespace: {{ .Values.application.name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: release-team
subjects:
- kind: ServiceAccount
  name: release-team
  namespace: {{ .Values.application.name }}
---
# This RoleBinding allows the release-team ServiceAccount to view project
# resources (without redefining read rules), by binding it to the
# built-in kargo-viewer Role.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: release-team-viewer
  namespace: {{ .Values.application.name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kargo-viewer
subjects:
- kind: ServiceAccount
  name: release-team
  namespace: {{ .Values.application.name }}