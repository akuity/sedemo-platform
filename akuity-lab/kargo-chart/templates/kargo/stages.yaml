apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev
  namespace: {{ .Values.application.name }}
  annotations:
    kargo.akuity.io/color: red
spec:
{{if .Values.services.s3.enabled }}
  # if using s3 service, we need access to IRSA role with permission to AWS.
  shard: sedemo-primary
{{ end }}
  requestedFreight:
  - origin:
      kind: Warehouse
      name: {{ .Values.application.name }}
    sources:
      direct: true
  - origin:
      kind: Warehouse
      name: '{{ .Values.application.name }}-chart'
    sources:
      direct: true
  # verification:
  #   analysisTemplates:
  #     - name: api-conformance-crunch42
  #       kind: AnalysisTemplate
  promotionTemplate:
    spec:
      steps:
      - uses: git-clone
        as: clone-base-chart
        config:
          repoURL: {{ .Values.chartUrl }}
          checkout:
          - branch: main
            path: ./chart
      - uses: git-clone
        as: clone-app-team-values
        config:
          repoURL: {{ .Values.repoUrl }}
          checkout:
          - branch: {{ .Values.git.main }}
            path: ./src
          - branch: env/{{ .Values.application.name }}-dev
            create: true
            path: ./out
      - uses: git-clear
        config:
          path: ./out
      {{if .Values.services.s3.enabled }}
      - uses: tf-apply
        config:
          dir: ./chart/terraform
          env:
          - name: AWS_REGION
            value: us-west-2
          - key: TF_VAR_app_name
            value: {{ .Values.application.name }}
          - key: TF_VAR_stage
            value: dev
      {{ end }}
      - uses: helm-template
        config:
          releaseName: deploy
          path: ./chart/{{ .Values.chartPath}}
          valuesFiles:
          - ./src/{{.Values.project.path}}/platform/values.yaml
          outPath: ./out/manifests.yaml
          namespace: '{{ .Values.application.name }}-dev'
          setValues:
            - key: image.tag
              value: "\"{{ printf "${{ imageFrom('%s').Tag }}" .Values.image.repository }}\""
            - key: kargo.stage
              value: dev
            - key: ingress.root_domain
              value: akpdemoapps.link
            - key: project.name
              value: '{{ .Values.application.name }}'
            - key: application.name
              value: '{{ .Values.application.name }}'
            {{if .Values.services.s3.enabled }}
            - key: services.s3.bucketName
              value: "{{ .Values.application.name }}-dev-bucket"
            {{ end  }}
      - uses: git-commit
        as: commit
        config:
          path: ./out
          message: "Promote {{ printf "${{ imageFrom('%s').Tag }}" .Values.image.repository }} to dev [skip ci]"
      - uses: git-push
        config:
          path: ./out
          targetBranch: env/{{ .Values.application.name }}-dev
      - uses: argocd-update
        continueOnError: true
        config:
          apps:
          - name: {{ .Values.application.name }}-dev
            namespace: argocd
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: stage-ready
  namespace: {{ .Values.application.name }}
  annotations:
    kargo.akuity.io/color: blue
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: {{ .Values.application.name }}
    sources:
      stages:
      - dev
  - origin:
      kind: Warehouse
      name: '{{ .Values.application.name }}-chart'
    sources:
      stages:
      - dev
  promotionTemplate:
    spec:
      steps:
      - uses: git-clone
        as: clone-combined-manifest
        config:
          repoURL: {{ .Values.chartUrl }}
          checkout:
          - branch: combined-staging
            path: ./bom
      - uses: git-clone
        as: clone-app-manifests
        config:
          repoURL: {{ .Values.chartUrl }}
          checkout:
          - branch: {{ .Values.application.name }}-dev
            path: ./manifests
      - uses: yaml-update
        config:
          path: ./bom/bom.yaml
          updates:
          - key: {{ .Values.application.name }}
            value: {{ printf "${{ imageFrom('%s').Tag }}" .Values.image.repository }}
      - uses: copy
        config:
          inPath: ./manifests/manifests.yaml
          outPath: ./bom/{{ .Values.application.name }}/manifests.yaml
      - uses: git-commit
        as: commit
        config:
          path: ./bom
          message: "Mark {{ printf "${{ imageFrom('%s').Tag }}" .Values.image.repository }} ready for staging. "
      - uses: git-push
        config:
          path: ./bom
          targetBranch: combined-staging
---
