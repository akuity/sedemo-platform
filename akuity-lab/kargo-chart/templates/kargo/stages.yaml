apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev
  namespace: {{ .Values.application.name }}
  annotations:
    kargo.akuity.io/color: red
spec:
{{if .Values.services.s3.enabled }}
  # if using s3 service, we need access to IRSA role with permission to AWS.
  shard: sedemo-primary
{{ end }}
  requestedFreight:
  - origin:
      kind: Warehouse
      name: {{ .Values.application.name }}
    sources:
      direct: true
  - origin:
      kind: Warehouse
      name: '{{ .Values.application.name }}-chart'
    sources:
      direct: true
  # verification:
  #   analysisTemplates:
  #     - name: api-conformance-crunch42
  #       kind: AnalysisTemplate
  promotionTemplate:
    spec:
      steps:
      - uses: git-clone
        as: clone-base-chart
        config:
          repoURL: {{ .Values.chartUrl }}
          checkout:
          - branch: main
            path: ./chart
      - uses: git-clone
        as: clone-app-team-values
        config:
          repoURL: {{ .Values.repoUrl }}
          checkout:
          - branch: {{ .Values.git.main }}
            path: ./src
          - branch: env/{{ .Values.application.name }}-dev
            create: true
            path: ./out
      - uses: git-clear
        config:
          path: ./out
      {{if .Values.services.s3.enabled }}
      - uses: tf-apply
        config:
          dir: ./chart/terraform
          env:
          - name: AWS_REGION
            value: us-west-2
          - name: TF_VAR_app_name
            value: "{{ .Values.application.name }}"
          - name: TF_VAR_stage
            value: dev
      {{ end }}
      - uses: helm-template
        config:
          releaseName: deploy
          path: ./chart/{{ .Values.chartPath}}
          valuesFiles:
          - ./src/{{.Values.project.path}}/platform/values.yaml
          outPath: ./out/manifests.yaml
          namespace: '{{ .Values.application.name }}-dev'
          setValues:
            - key: image.tag
              value: "\"{{ printf "${{ imageFrom('%s').Tag }}" .Values.image.repository }}\""
            - key: kargo.stage
              value: dev
            - key: ingress.root_domain
              value: akpdemoapps.link
            - key: project.name
              value: '{{ .Values.application.name }}'
            - key: application.name
              value: '{{ .Values.application.name }}'
            {{if .Values.services.s3.enabled }}
            - key: services.s3.bucketName
              value: "{{ .Values.application.name }}-dev-bucket"
            {{ end  }}
      - uses: git-commit
        as: commit
        config:
          path: ./out
          message: "Promote {{ printf "${{ imageFrom('%s').Tag }}" .Values.image.repository }} to dev [skip ci]"
      - uses: git-push
        config:
          path: ./out
          targetBranch: env/{{ .Values.application.name }}-dev
      - uses: compose-output
        as: pr-link
        config:
          url: |
            ${% quote({
              "ref": "refs/tags/{{.Values.application.name}}-" + imageFrom('{{.Values.image.repository}}').Tag,
              "sha": outputs['clone-app-team-values'].commits['./src']
            }) %}
      - uses: http
        as: create-tag
        continueOnError: true
        config:
          method: POST
          url: https://api.github.com/repos/akuity/sedemo-app-monorepo/git/refs
          headers:
          - name: Authorization
            value: "Bearer ${% sharedSecret('eddies-pat').pat %}"
          - name: Accept
            value: "application/vnd.github+json"
          - name: X-GitHub-Api-Version
            value: "2022-11-28"
          failureExpression: response.status != 201
          successExpression: response.status == 201
          body: |
            ${% quote({
              "ref": "refs/tags/{{.Values.application.name}}-" + imageFrom('{{.Values.image.repository}}').Tag,
              "sha": outputs['clone-app-team-values'].commits['./src']
            }) %}
      - uses: argocd-update
        continueOnError: true
        config:
          apps:
          - name: {{ .Values.application.name }}-dev
            namespace: argocd
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: stage-ready
  namespace: {{ .Values.application.name }}
  annotations:
    kargo.akuity.io/color: blue
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: {{ .Values.application.name }}
    sources:
      stages:
      - dev
  - origin:
      kind: Warehouse
      name: '{{ .Values.application.name }}-chart'
    sources:
      stages:
      - dev
  promotionTemplate:
    spec:
      steps:
      - uses: git-clone
        as: clone-combined-manifest
        config:
          repoURL: {{ .Values.repoUrl }}
          checkout:
          - branch: gateway
            path: ./bom
      - uses: yaml-update
        config:
          path: ./bom/bom.yaml
          updates:
          - key: images.{{ .Values.application.name }}
            value: {{ printf "${{ imageFrom('%s').Tag }}" .Values.image.repository }}
      - uses: git-commit
        as: commit
        config:
          path: ./bom
          message: "Mark {{ .Values.application.name }}-{{ printf "${{ imageFrom('%s').Tag }}" .Values.image.repository }} ready for staging. "
      - uses: git-push
        config:
          path: ./bom
          targetBranch: gateway


      