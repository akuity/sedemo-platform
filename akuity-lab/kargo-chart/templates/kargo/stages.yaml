apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev
  namespace: {{ .Values.application.name }}
  annotations:
    kargo.akuity.io/color: red
spec:
{{if .Values.services.s3.enabled }}
  # if using s3 service, we need access to IRSA role with permission to AWS.
  shard: sedemo-primary
{{ end }}
  requestedFreight:
  - origin:
      kind: Warehouse
      name: {{ .Values.application.name }}
    sources:
      direct: true
  - origin:
      kind: Warehouse
      name: '{{ .Values.application.name }}-chart'
    sources:
      direct: true
  # verification:
  #   analysisTemplates:
  #     - name: api-conformance-crunch42
  #       kind: AnalysisTemplate
  promotionTemplate:
    spec:
      steps:
      - uses: git-clone
        as: clone-base-chart
        config:
          repoURL: {{ .Values.chartUrl }}
          checkout:
          - branch: main
            path: ./chart
      - uses: git-clone
        as: clone-app-team-values
        config:
          repoURL: {{ .Values.repoUrl }}
          checkout:
          - branch: {{ .Values.git.main }}
            path: ./src
          - branch: env/{{ .Values.application.name }}-dev
            create: true
            path: ./out
      - uses: git-clear
        config:
          path: ./out
      {{if .Values.services.s3.enabled }}
      - uses: tf-apply
        config:
          dir: ./chart/terraform
          env:
          - name: AWS_REGION
            value: us-west-2
          - key: TF_VAR_app_name
            value: {{ .Values.application.name }}
          - key: TF_VAR_stage
            value: dev
      {{ end }}
      - uses: helm-template
        config:
          releaseName: deploy
          path: ./chart/{{ .Values.chartPath}}
          valuesFiles:
          - ./src/{{.Values.project.path}}/platform/values.yaml
          outPath: ./out/manifests.yaml
          namespace: '{{ .Values.application.name }}-dev'
          setValues:
            - key: image.tag
              value: "\"{{ printf "${% imageFrom('%s').Tag %}" .Values.image.repository }}\""
            - key: kargo.stage
              value: dev
            - key: ingress.root_domain
              value: akpdemoapps.link
            - key: project.name
              value: '{{ .Values.application.name }}'
            - key: application.name
              value: '{{ .Values.application.name }}'
            {{if .Values.services.s3.enabled }}
            - key: services.s3.bucketName
              value: "{{ .Values.application.name }}-dev-bucket"
            {{ end  }}
      - uses: git-commit
        as: commit
        config:
          path: ./out
          message: "Promote {{ printf "${% imageFrom('%s').Tag %}" .Values.image.repository }} to dev [skip ci]"
      - uses: git-push
        config:
          path: ./out
          targetBranch: env/{{ .Values.application.name }}-dev
      - uses: argocd-update
        continueOnError: true
        config:
          apps:
          - name: {{ .Values.application.name }}-dev
            namespace: argocd
{{ if .Values.environments.staging }}
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: staging
  namespace: {{ .Values.application.name }}
  annotations:
    kargo.akuity.io/color: amber
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: {{ .Values.application.name }}
    sources:
      stages:
      - dev
  - origin:
      kind: Warehouse
      name: '{{ .Values.application.name }}-chart'
    sources:
      stages:
      - dev
  promotionTemplate:
    spec:
      steps:
      - uses: git-clone
        as: clone-base-chart
        config:
          repoURL: {{ .Values.chartUrl }}
          checkout:
          - branch: main
            path: ./chart
      - uses: git-clone
        config:
          repoURL: {{ .Values.repoUrl }}
          checkout:
          - branch: {{ .Values.git.main }}
            path: ./src
          - branch: env/{{ .Values.application.name }}-staging
            create: true
            path: ./out
      - uses: git-clear
        config:
          path: ./out
      - uses: helm-template
        config:
          releaseName: deploy
          path: ./chart/{{ .Values.chartPath}}
          valuesFiles:
          - ./src/{{.Values.project.path}}/platform/app-values.yaml
          outPath: ./out/manifests.yaml
          namespace: '{{ .Values.application.name }}-staging'
          setValues:
            - key: image.tag
              value: "\"{{ printf "${% imageFrom('%s').Tag %}" .Values.image.repository }}\""
            - key: kargo.stage
              value: staging
            - key: ingress.root_domain
              value: akpdemoapps.link
            - key: project.name
              value: '{{ .Values.application.name }}'
            - key: application.name
              value: '{{ .Values.application.name }}'
      - uses: jira
        as: find-open-promotions
        config:
          credentials:
            sharedSecretName: jira-access-secret
          searchIssue:
            jql: 'project = CHANGE AND status != "Done" AND labels = "${% ctx.stage %}-promotion" AND created >= -7d'
            expectMultiple: false
            fields:
            - summary
            - status
            - assignee
            - created
            expands:
            - changelog 
      - uses: jira
        as: update-promotion-ticket
        if: '${% if outputs["find-open-promotions"].issue %}'
        config:
          credentials:
            sharedSecretName: jira-access-secret
          updateIssue:
            issueKey: "${% outputs['find-open-promotions'].issue.key }}"
            addLabels:
            - "release-{{ .Values.application.name }}-${% imageFrom(vars.imageRepo).Tag %}"
      - uses: jira
        as: create-change-ticket
        if: '${% if not outputs["find-open-promotions"].issue %}'
        config:
          credentials:
            sharedSecretName: jira-access-secret
          createIssue:
            projectKey: CHANGE
            summary: "Promote ${% imageFrom(vars.imageRepo).Tag %} to ${% ctx.stage %}"
            adfDescription:
              type: doc
              version: 1
              content:
              - type: heading
                attrs:
                  level: 3
                content:
                - type: text
                  text: "Promotion: ${% ctx.stage %}"
              - type: bulletList
                content:
                - type: listItem   
                  content:
                  - type: paragraph
                    content:
                    - type: text               
                      text: "Application: {{ .Values.application.name }} to ${% imageFrom(vars.imageRepo).Tag %}"
            issueType: task
            #customFields:
              #customfield_11301: Standard
              #customfield_10800: Request a change
            labels:
            - promotion
            - "${% ctx.stage %}-promotion"
            - "release-{{ .Values.application.name }}-${% imageFrom(vars.imageRepo).Tag %}"
      - uses: compose-output
        if: '${% if not outputs["find-open-promotions"].issue %}'
        as: jira-link
        config:
          url: https://eddiewebb.atlassian.net/jira/servicedesk/projects/CHANGE/queues/custom/21/${% outputs['create-change-ticket'].key %}
      - uses: compose-output
        if: '${% if outputs["find-open-promotions"].issue %}'
        as: jira-link
        config:
          url: https://eddiewebb.atlassian.net/jira/servicedesk/projects/CHANGE/queues/custom/21/${% outputs['find-open-promotion'].issue.key %}
      
    
      - uses: jira
        as: wait-for-approval
        config:
          credentials:
            sharedSecretName: jira-access-secret
          waitForStatus:
            issueKey: "${% outputs['create-change-ticket'].key %}"
            expectedStatus: "APPROVED"
    
      - uses: git-commit
        as: commit
        config:
          path: ./out
          message: "Promote {{ printf "${% imageFrom('%s').Tag %}" .Values.image.repository }} to staging [skip ci]"
      - uses: git-push
        config:
          path: ./out
          targetBranch: env/{{ .Values.application.name }}-staging
      - uses: argocd-update
        continueOnError: true
        config:
          apps:
          - name: '{{ .Values.application.name }}-staging'
            namespace: argocd
{{ end }}