


replicaCount: 2

# this will be used to template namespaced resources, matches the path within monorepo. 
application:
  name: template

project:
  name: templated-name
  group: sedemo-team-open
  path: templated/name

# Platform-wide RBAC group prefix (e.g. sedemo-admin, sedemo-qa).
# Overridden by appset-repos.yaml; default here guards helm render.
team:
  role: sedemo


kargo:
  # this will be overridden per environment by kargo promo steps.
  stage: dev

git:
    main: main
    outPath: out
    srcPth: src

# Some level of control exposed to app teams on how they want apps exposed to internet
ingress:
  root_domain: akpdemoapps.link
  custom_prefix: example


rollouts:
  enabled: true

environments:
  dev: true
  staging: true
  prod: true

