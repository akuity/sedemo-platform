apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: demo-ephemeral-dev
resources:
- ../base
images:
- name: ghcr.io/akuity/sedemo-monorepo-rollouts-app
  newTag: 43-green
patches:
- patch: |-
    - op: replace
      path: /data/environment
      value: dev
