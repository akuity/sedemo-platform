apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev
  namespace: demo-ephemeral
  annotations:
    kargo.akuity.io/color: green
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: demo-ephemeral-release
    sources:
      direct: true
  promotionTemplate:
    spec:
      steps:
      - task:
          name: deploy-app
        vars:
        - name: env
          value: dev
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: staging
  namespace: demo-ephemeral
  annotations:
    kargo.akuity.io/color: yellow
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: demo-ephemeral-release
    sources:
      stages:
      - dev
  promotionTemplate:
    spec:
      steps:
      - task:
          name: deploy-app
        vars:
        - name: env
          value: staging
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: prod
  namespace: demo-ephemeral
  annotations:
    kargo.akuity.io/color: red
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: demo-ephemeral-release
    sources:
      stages:
      - staging
  promotionTemplate:
    spec:
      steps:
      - task:
          name: deploy-app
        vars:
        - name: env
          value: prod
