# Deploys the rendered manifests for each PR preview to the sedemo-primary cluster.
# One ArgoCD Application per open PR, syncing from env-ephemeral/pr-<number>.
# Pruned automatically when the PR closes.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: demo-ephemeral-apps
  namespace: argocd
spec:
  generators:
  - pullRequest:
      github:
        owner: akuity
        repo: sedemo-monorepo
        tokenRef:
          secretName: application-set-secret
          key: token
      requeueAfterSeconds: 180
      filters:
      - labels:
        - preview
  template:
    metadata:
      name: demo-ephemeral-pr-{{number}}
      annotations:
        kargo.akuity.io/authorized-stage: demo-ephemeral:preview-pr-{{number}}
        notifications.argoproj.io/subscriptions: |
          - trigger: [on-sync-succeeded, on-sync-running]
            destinations:
              - service: sedemo
                recipients: [argo-notifications]
    spec:
      project: demo-ephemeral
      source:
        repoURL: https://github.com/akuity/sedemo-monorepo
        targetRevision: env-ephemeral/pr-{{number}}
        path: .
      destination:
        name: sedemo-primary
        namespace: demo-ephemeral-pr-{{number}}
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 10
          backoff:
            duration: 15s
            factor: 2
            maxDuration: 5m
        syncOptions:
        - CreateNamespace=true
---
# Deploys a per-PR Warehouse + Stage to the kargo cluster.
# The Warehouse is scoped to pr-<number>-* tags only, preventing cross-PR freight.
# Both resources are pruned when the PR closes.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: demo-ephemeral-stages
  namespace: argocd
spec:
  generators:
  - pullRequest:
      github:
        owner: akuity
        repo: sedemo-monorepo
        tokenRef:
          secretName: application-set-secret
          key: token
      requeueAfterSeconds: 180
      filters:
      - labels:
        - preview
  template:
    metadata:
      name: demo-ephemeral-stage-pr-{{number}}
    spec:
      project: demo-ephemeral
      source:
        repoURL: https://github.com/akuity/sedemo-platform
        targetRevision: main
        path: apps/demo-ephemeral/stage-template
        helm:
          parameters:
          - name: prNumber
            value: "{{number}}"
          - name: branch
            value: "{{branch}}"
          - name: headSHA
            value: "{{head_sha}}"
      destination:
        name: kargo
        namespace: demo-ephemeral
      syncPolicy:
        automated:
          prune: true
          enabled: true
          selfHeal: true
