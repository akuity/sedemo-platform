apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base

# Prod namespace — deployed manually inside the airgapped environment.
# Argo CD does NOT manage this namespace; it is applied via kubectl by the ops team.
namespace: oci-airgap-prod

patches:
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/env/0/value
      value: prod
    - op: replace
      path: /spec/replicas
      value: 3
    - op: add
      path: /spec/template/spec/containers/0/resources
      value:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi
  target:
    kind: Deployment
    name: oci-airgap
