apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base

namespace: oci-airgap-stage

patches:
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/env/0/value
      value: stage
    - op: replace
      path: /spec/replicas
      value: 2
  target:
    kind: Deployment
    name: oci-airgap
