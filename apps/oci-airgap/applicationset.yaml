# ApplicationSet for the oci-airgap demo — dev, test, and stage only.
#
# Each Application syncs directly from the OCI artifact pushed by Kargo at dev
# time. Kargo sets `targetRevision` to the promoted image tag per-promotion;
# `path` selects the env-specific subdirectory inside the tar+gzip layer.
#
# Prod is intentionally EXCLUDED: it runs in an airgapped cluster with its own
# Argo CD instance pointing at an internal mirror registry. That Application is
# managed separately and is not reachable from the connected cluster.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: oci-airgap
  namespace: argocd
spec:
  generators:
  - list:
      elements:
      - stage: dev
      - stage: test
      - stage: stage
  template:
    metadata:
      name: oci-airgap-{{stage}}
      annotations:
        # Allow Kargo to trigger a refresh/sync for this Application.
        kargo.akuity.io/authorized-stage: oci-airgap:{{stage}}
    spec:
      project: oci-airgap
      source:
        # Kargo updates targetRevision to the promoted image tag on each promotion.
        # path selects the env-specific subdirectory rendered at dev time.
        repoURL: oci://ghcr.io/akuity/oci-airgap-bundles
        targetRevision: latest
        path: "{{stage}}"
      destination:
        name: sedemo-primary
        namespace: oci-airgap-{{stage}}
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
