# Stage: dev
#
# Entry point of the pipeline. On every new Freight (new image tag or overlay
# change), Kargo:
#   • Renders all four environment overlays via kustomize-build
#   • Pushes the rendered YAML files as separate layers of one OCI artifact
#   • Deploys the dev overlay to the dev cluster via a rendered git branch
#
# Auto-promotion is enabled (see project.yaml) so the OCI bundle stays current
# without manual intervention in the lower environment.
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev
  namespace: oci-airgap
  annotations:
    kargo.akuity.io/color: red
    argocd.argoproj.io/sync-wave: "2"
spec:
  shard: sedemo-primary
  requestedFreight:
  - origin:
      kind: Warehouse
      name: oci-airgap
    sources:
      direct: true
  promotionTemplate:
    spec:
      vars:
      - name: gitRepo
        value: https://github.com/akuity/sedemo-platform
      - name: imageRepo
        value: ghcr.io/akuity/guestbook
      # OCI bundle registry — update to your org's registry / repository.
      - name: bundleRegistry
        value: ghcr.io
      - name: bundleRepo
        value: akuity/oci-airgap-bundles
      steps:
      - task:
          name: render-and-push-oci
---
# Stage: test
#
# Promotes the OCI artifact from dev to test by updating the Argo CD Application
# to sync from the new tag at path `test` — no oras-pull, no git round-trip.
#
# The manifests are taken verbatim from the OCI bundle (rendered at dev time),
# ensuring test runs exactly what was packaged.
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: test
  namespace: oci-airgap
  annotations:
    kargo.akuity.io/color: amber
    argocd.argoproj.io/sync-wave: "2"
spec:
  shard: sedemo-primary
  requestedFreight:
  - origin:
      kind: Warehouse
      name: oci-airgap
    sources:
      stages:
      - dev
  promotionTemplate:
    spec:
      vars:
      - name: imageRepo
        value: ghcr.io/akuity/guestbook
      - name: bundleRegistry
        value: ghcr.io
      - name: bundleRepo
        value: akuity/oci-airgap-bundles
      steps:
      - task:
          name: pull-and-apply-oci
---
# Stage: stage
#
# Same argocd-update-from-OCI pattern as test, but targets the staging cluster.
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: stage
  namespace: oci-airgap
  annotations:
    kargo.akuity.io/color: violet
    argocd.argoproj.io/sync-wave: "2"
spec:
  shard: sedemo-primary
  requestedFreight:
  - origin:
      kind: Warehouse
      name: oci-airgap
    sources:
      stages:
      - test
  promotionTemplate:
    spec:
      vars:
      - name: imageRepo
        value: ghcr.io/akuity/guestbook
      - name: bundleRegistry
        value: ghcr.io
      - name: bundleRepo
        value: akuity/oci-airgap-bundles
      steps:
      - task:
          name: pull-and-apply-oci
---
# Stage: prod  (AIRGAPPED)
#
# Prod has no external network access. The OCI artifact must be mirrored into
# the airgapped registry by the ops team; the in-cluster Argo CD then syncs
# automatically from the internal registry — no manual kubectl apply.
#
# This stage:
#   1. Creates a ServiceNow change request with exact skopeo mirror instructions
#   2. Waits for the ticket to be closed (proof of transfer + Argo CD sync)
#   3. Marks the freight as promoted in Kargo for audit trail purposes
#
# The prod Argo CD Application lives in the airgapped cluster and is managed
# separately — it is not in applicationset.yaml (which runs on the connected cluster).
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: prod
  namespace: oci-airgap
  annotations:
    kargo.akuity.io/color: green
    argocd.argoproj.io/sync-wave: "2"
spec:
  # No shard — prod cluster is airgapped and not registered with the Kargo controller.
  requestedFreight:
  - origin:
      kind: Warehouse
      name: oci-airgap
    sources:
      stages:
      - stage
  promotionTemplate:
    spec:
      vars:
      - name: imageRepo
        value: ghcr.io/akuity/guestbook
      - name: bundleRegistry
        value: ghcr.io
      - name: bundleRepo
        value: akuity/oci-airgap-bundles
      steps:
      - task:
          name: airgap-prod-gate
