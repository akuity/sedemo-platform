# Two pipelines in one Project.
#
#   IaC pipeline (postgres-iac-warehouse):
#     iac-dev  ->  iac-staging  ->  iac-prod
#
#   App pipeline (app-warehouse), coupled to IaC:
#     app-dev  ->  app-prod
#
# Q2 (cross-Freight dependency): the App Stages request Freight from TWO
#   origins. The Postgres-IaC source uses availabilityStrategy: All, so the
#   Stage only becomes promotable once Postgres has been verified at the
#   listed upstream IaC Stage. A pre-promotion compat check inside deploy-app
#   then asserts the App's declared requiredPostgresMajor matches the IaC's
#   current PG major (parsed via semverParse).
#
# Q3 (no skipping versions): downstream IaC Stages use
#   selectionPolicy: MatchUpstream so they only promote the Freight CURRENTLY
#   in the upstream Stage — PG 14 cannot jump to PG 16 even if 15 and 16 are
#   already in iac-dev. The semver-guard in deploy-iac is a second layer.

---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: iac-dev
  namespace: app-iac-coupled
  annotations:
    kargo.akuity.io/color: amber
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: postgres-iac-warehouse
    sources:
      direct: true
  verification:
    analysisTemplates:
    - name: postgres-smoke
    args:
    - name: environment
      value: dev
  promotionTemplate:
    spec:
      steps:
      - task:
          name: deploy-iac
        vars:
        - name: env
          value: dev
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: iac-staging
  namespace: app-iac-coupled
  annotations:
    kargo.akuity.io/color: amber
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: postgres-iac-warehouse
    sources:
      stages:
      - iac-dev
      # MatchUpstream: promote whatever Freight currently lives in iac-dev,
      # never "skip" to a newer Freight that exists in the Warehouse. This is
      # how we enforce 14 -> 15 -> 16 even when Stages fall behind.
      selectionPolicy: MatchUpstream
  verification:
    analysisTemplates:
    - name: postgres-smoke
    args:
    - name: environment
      value: staging
  promotionTemplate:
    spec:
      steps:
      - task:
          name: deploy-iac
        vars:
        - name: env
          value: staging
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: iac-prod
  namespace: app-iac-coupled
  annotations:
    kargo.akuity.io/color: amber
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: postgres-iac-warehouse
    sources:
      stages:
      - iac-staging
      selectionPolicy: MatchUpstream
  verification:
    analysisTemplates:
    - name: postgres-smoke
    args:
    - name: environment
      value: prod
  promotionTemplate:
    spec:
      steps:
      - task:
          name: deploy-iac
        vars:
        - name: env
          value: prod
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: app-dev
  namespace: app-iac-coupled
  annotations:
    kargo.akuity.io/color: blue
spec:
  requestedFreight:
  # Two sources: the App Freight AND the Postgres IaC Freight currently in
  # iac-dev. Promotion only fires when BOTH are available; the pre-deploy
  # compat check inside deploy-app fails the promotion if the App's declared
  # requiredPostgresMajor doesn't match the IaC's current PG major.
  - origin:
      kind: Warehouse
      name: app-warehouse
    sources:
      direct: true
  - origin:
      kind: Warehouse
      name: postgres-iac-warehouse
    sources:
      stages:
      - iac-dev
      availabilityStrategy: All
  verification:
    analysisTemplates:
    - name: vm-smoke
    args:
    - name: environment
      value: dev
  promotionTemplate:
    spec:
      steps:
      - task:
          name: deploy-app
        vars:
        - name: env
          value: dev
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: app-prod
  namespace: app-iac-coupled
  annotations:
    kargo.akuity.io/color: cyan
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: app-warehouse
    sources:
      stages:
      - app-dev
      selectionPolicy: MatchUpstream
  - origin:
      kind: Warehouse
      name: postgres-iac-warehouse
    sources:
      stages:
      - iac-prod
      availabilityStrategy: All
  verification:
    analysisTemplates:
    - name: vm-smoke
    args:
    - name: environment
      value: prod
  promotionTemplate:
    spec:
      steps:
      - task:
          name: deploy-app
        vars:
        - name: env
          value: prod
