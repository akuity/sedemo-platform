# Two Warehouses scoped to different parts of the monorepo.
#
# Q1 (path filtering): each Warehouse only produces Freight when its own
# subscriptions change. A pure-IaC commit can't spawn App Freight, and vice versa.
#
# Q3 (sequential / no-skip): postgres-iac uses freightCreationPolicy: Automatic
# so every commit becomes a Freight in arrival order. Combined with
# selectionPolicy: MatchUpstream on downstream Stages (see stages.yaml) and an
# imperative semver guard in deploy-iac (see promotion-tasks.yaml), this yields
# PG 14 -> 15 -> 16 ordering — pg_upgrade's actual constraint.

apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: app-warehouse
  namespace: app-iac-coupled
spec:
  freightCreationPolicy: Automatic
  # Two subscriptions in one Warehouse: a new App Freight is produced when
  # EITHER a new app image is pushed OR the app's declared dependencies
  # (apps/demo-app-iac-coupled/app/spec.yaml) change.
  subscriptions:
  - image:
      repoURL: ghcr.io/blakepettersson/sedemo-monorepo-rollouts-app
      discoveryLimit: 10
      imageSelectionStrategy: NewestBuild
      # Real tag pattern used elsewhere in this repo, e.g. "43-green".
      allowTags: ^\d+-[a-z]+$
  - git:
      repoURL: https://github.com/blakepettersson/sedemo-platform.git
      branch: stateful-infra
      # NOTE: paths are EXACT-MATCH by default. A bare directory is treated as
      # "anything under it" (see apps/active-active/kargo/warehouse.yaml for a
      # known-working example). To use globs/regex, prefix with "glob:" or
      # "regex:". Trailing /** with no prefix becomes a literal — Kargo will
      # log "No commits discovered" because nothing matches the literal path.
      includePaths:
      - apps/demo-app-iac-coupled/app
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: postgres-iac-warehouse
  namespace: app-iac-coupled
spec:
  freightCreationPolicy: Automatic
  subscriptions:
  - git:
      repoURL: https://github.com/blakepettersson/sedemo-platform.git
      branch: stateful-infra
      includePaths:
      - apps/demo-app-iac-coupled/iac/postgres
