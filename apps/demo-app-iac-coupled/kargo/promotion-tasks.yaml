---
# IaC promotion: copy iac/postgres/version.yaml into the per-env overlay.
# Pure git-commit + git-push. NO argocd-update on purpose — IaC here is
# Terraform/Helm-applied out of band; Kargo's job is to publish the desired
# version into Git.
#
# Q3 (defense in depth): the Stage's selectionPolicy: MatchUpstream is the
# DECLARATIVE rule that controls which Freight gets selected for promotion.
# The semver-guard step below is the IMPERATIVE rule that controls whether
# the selected Freight is actually deployed. It uses Kargo's built-in
# semverDiff/semverParse functions to enforce same-major or exactly +1 major,
# blocking downgrades and major skips. The guard catches:
#   - Manual promotions that bypass auto-promotion ordering
#   - Multi-upstream sources where MatchUpstream cannot be used (single-upstream only)
#   - Accidental downgrades
apiVersion: kargo.akuity.io/v1alpha1
kind: PromotionTask
metadata:
  name: deploy-iac
  namespace: app-iac-coupled
spec:
  vars:
  - name: env
  - name: gitRepo
    value: https://github.com/blakepettersson/sedemo-platform.git
  steps:
  - uses: git-clone
    config:
      repoURL: ${{ vars.gitRepo }}
      checkout:
      - branch: main
        path: ./src

  # Parse the version currently deployed in this env (last successful promotion).
  - uses: yaml-parse
    as: current
    config:
      path: ./src/apps/demo-app-iac-coupled/env/${{ vars.env }}/postgres/version.yaml
      outputs:
      - name: version
        fromExpression: outputs.version

  # Parse the incoming Freight's version (the source-of-truth file the
  # postgres-iac-warehouse is subscribed to).
  - uses: yaml-parse
    as: incoming
    config:
      path: ./src/apps/demo-app-iac-coupled/iac/postgres/version.yaml
      outputs:
      - name: version
        fromExpression: outputs.version

  # Semver guard using Kargo's built-in expression functions.
  #   - semverDiff(a, b) returns "None" | "Patch" | "Minor" | "Major" | "Metadata" | "Incomparable".
  #     It tells us the MAGNITUDE of difference but NOT the direction. A
  #     14 -> 16 forward jump and a 16 -> 14 downgrade both return "Major".
  #   - semverParse(v).Major() / IncMajor() lets us assert "exactly current+1".
  #
  # Rule: allow same version (re-deploy), same-major changes (minor/patch),
  # or exactly the next major. Block downgrades and major skips — which is
  # also pg_upgrade's actual constraint.
  #
  # Docs: https://docs.kargo.io/user-guide/reference-docs/expressions
  - uses: http
    as: semver-guard
    config:
      method: GET
      url: https://httpbin.org/status/200
      successExpression: |
        semverDiff(outputs.incoming.version, outputs.current.version) != 'Major' ||
        semverParse(outputs.incoming.version).Major() == semverParse(outputs.current.version).IncMajor().Major()
      failureExpression: |
        semverDiff(outputs.incoming.version, outputs.current.version) == 'Major' &&
        semverParse(outputs.incoming.version).Major() != semverParse(outputs.current.version).IncMajor().Major()

  - uses: copy
    config:
      inPath: ./src/apps/demo-app-iac-coupled/iac/postgres/version.yaml
      outPath: ./src/apps/demo-app-iac-coupled/env/${{ vars.env }}/postgres/version.yaml
  - uses: git-commit
    config:
      path: ./src
      message: "iac/postgres: promote ${{ outputs.incoming.version }} to ${{ ctx.stage }} (was ${{ outputs.current.version }}) [skip ci]"
  - uses: git-push
    config:
      path: ./src
      targetBranch: main
---
# App promotion with an inline version-compat gate.
#
# Q2 illustration: the App's declared requiredPostgresMajor (in app/spec.yaml)
# must equal the Postgres major currently deployed in this env (parsed from
# env/<env>/postgres/version.yaml via semverParse). Promotion fails (visibly)
# when they diverge — exactly the signal an SRE wants when the App's required
# DB version is ahead of (or behind) what IaC has provisioned.
#
# Q4 illustration: the argocd-update step at the end is what you'd REMOVE for
# the agentless variant. Without it, Kargo's only "deploy" action is the git
# commit; downstream pickup and health verification are entirely external.
apiVersion: kargo.akuity.io/v1alpha1
kind: PromotionTask
metadata:
  name: deploy-app
  namespace: app-iac-coupled
spec:
  vars:
  - name: env
  - name: appImage
    value: ghcr.io/blakepettersson/sedemo-monorepo-rollouts-app
  - name: gitRepo
    value: https://github.com/blakepettersson/sedemo-platform.git
  steps:
  - uses: git-clone
    config:
      repoURL: ${{ vars.gitRepo }}
      checkout:
      - branch: main
        path: ./src

  # Read the App's declared dependency. This file is part of the App Warehouse's
  # Git subscription, so changing it produces a new App Freight (Q1 path-filter
  # story).
  - uses: yaml-parse
    as: appSpec
    config:
      path: ./src/apps/demo-app-iac-coupled/app/spec.yaml
      outputs:
      - name: requiredMajor
        fromExpression: outputs.requiredPostgresMajor

  # Read the IaC Freight's currently-deployed Postgres version in this env.
  - uses: yaml-parse
    as: iac
    config:
      path: ./src/apps/demo-app-iac-coupled/env/${{ vars.env }}/postgres/version.yaml
      outputs:
      - name: version
        fromExpression: outputs.version

  # Compatibility gate: the App's declared PG major must equal the IaC's
  # actually-deployed PG major (extracted via semverParse).
  - uses: http
    as: compat-check
    config:
      method: GET
      url: https://httpbin.org/status/200
      successExpression: |
        int(outputs.appSpec.requiredMajor) == semverParse(outputs.iac.version).Major()
      failureExpression: |
        int(outputs.appSpec.requiredMajor) != semverParse(outputs.iac.version).Major()

  - uses: kustomize-set-image
    config:
      path: ./src/apps/demo-app-iac-coupled/env/${{ vars.env }}/app
      images:
      - image: ${{ vars.appImage }}
        tag: ${{ imageFrom(vars.appImage).Tag }}

  - uses: git-commit
    config:
      path: ./src
      message: "app-${{ vars.env }}: promote ${{ imageFrom(vars.appImage).Tag }} (requires PG ${{ outputs.appSpec.requiredMajor }}, deployed PG ${{ semverParse(outputs.iac.version).Major() }})"

  - uses: git-push
    config:
      path: ./src
      targetBranch: main

  # AGENTFUL mode: keep this step. Argo CD syncs the app via the Akuity Agent.
  # AGENTLESS mode (Q4): delete the step below. The only "deploy" trace Kargo
  # leaves is the git commit; an external CD or GitOps controller picks it up,
  # and health/version proof comes from the vm-smoke AnalysisTemplate.
  - uses: argocd-update
    config:
      apps:
      - name: app-${{ vars.env }}
