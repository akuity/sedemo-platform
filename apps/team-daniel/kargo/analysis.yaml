# =============================================================================
# AnalysisTemplates — team-daniel
# =============================================================================
# Uses the PokeAPI as a simple external HTTP health check between stages.
# Each stage hits a different Pokemon endpoint to demonstrate per-stage
# verification with different thresholds.
# =============================================================================

---
# dev: fast canary health check (Pikachu — base_experience < 120)
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: ring-health-check
  namespace: team-daniel
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  args:
  - name: ring
  - name: threshold
  metrics:
  - name: pokemon-health
    interval: 5s
    count: 3
    successCondition: result < 120
    failureLimit: 1
    provider:
      web:
        url: https://pokeapi.co/api/v2/pokemon/pikachu
        jsonPath: "{$.base_experience}"

---
# staging: higher bar — success rate check (Charizard — base_experience < 200)
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: ring-success-rate
  namespace: team-daniel
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  args:
  - name: ring
  - name: min-success-rate
  metrics:
  - name: pokemon-success
    interval: 5s
    count: 3
    successCondition: result < 200
    failureLimit: 1
    provider:
      web:
        url: https://pokeapi.co/api/v2/pokemon/charizard
        jsonPath: "{$.base_experience}"

---
# prod-us / prod-eu: regional health check (Bulbasaur — base_experience < 100)
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: ring-regional-health
  namespace: team-daniel
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  args:
  - name: region
  metrics:
  - name: pokemon-regional
    interval: 5s
    count: 3
    successCondition: result < 100
    failureLimit: 1
    provider:
      web:
        url: https://pokeapi.co/api/v2/pokemon/bulbasaur
        jsonPath: "{$.base_experience}"
