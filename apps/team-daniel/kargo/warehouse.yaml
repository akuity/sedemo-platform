---
# warehouse-frontend
# Tracks the user-facing frontend image independently so UI changes can
# ship on their own cadence without waiting on backend service updates.
apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: warehouse-frontend
  namespace: team-daniel
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  subscriptions:
  - image:
      repoURL: us-central1-docker.pkg.dev/google-samples/microservices-demo/frontend
  - git:
      repoURL: https://github.com/akuity/sedemo-platform
      branch: main
      includePaths:
      - apps/team-daniel/services/online-boutique

---
# warehouse-checkout
# Groups the checkout flow services together — checkout, payment, currency,
# and email are co-released as a transactional bundle.
apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: warehouse-checkout
  namespace: team-daniel
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  subscriptions:
  - image:
      repoURL: us-central1-docker.pkg.dev/google-samples/microservices-demo/checkoutservice
  - image:
      repoURL: us-central1-docker.pkg.dev/google-samples/microservices-demo/paymentservice
  - image:
      repoURL: us-central1-docker.pkg.dev/google-samples/microservices-demo/currencyservice
  - image:
      repoURL: us-central1-docker.pkg.dev/google-samples/microservices-demo/emailservice

---
# warehouse-catalog
# Product catalog, recommendations, and ads are versioned together —
# catalog data schema changes must stay in sync with both consumers.
apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: warehouse-catalog
  namespace: team-daniel
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  subscriptions:
  - image:
      repoURL: us-central1-docker.pkg.dev/google-samples/microservices-demo/productcatalogservice
  - image:
      repoURL: us-central1-docker.pkg.dev/google-samples/microservices-demo/recommendationservice
  - image:
      repoURL: us-central1-docker.pkg.dev/google-samples/microservices-demo/adservice

---
# warehouse-cart
# Cart, shipping, and load generator are grouped — cart mutations
# must be validated end-to-end with shipping calculations.
apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: warehouse-cart
  namespace: team-daniel
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  subscriptions:
  - image:
      repoURL: us-central1-docker.pkg.dev/google-samples/microservices-demo/cartservice
  - image:
      repoURL: us-central1-docker.pkg.dev/google-samples/microservices-demo/shippingservice
  - image:
      repoURL: us-central1-docker.pkg.dev/google-samples/microservices-demo/loadgenerator
