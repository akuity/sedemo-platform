---
apiVersion: kargo.akuity.io/v1alpha1
kind: PromotionTask
metadata:
  name: promote-guestbook
  namespace: team-daniel
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  vars:
  - name: gitRepo
    value: https://github.com/akuity/sedemo-platform
  - name: imageRepo
    value: ghcr.io/akuity/guestbook
  steps:
  - uses: git-clone
    config:
      repoURL: ${{ vars.gitRepo }}
      checkout:
      - branch: main
        path: ./out
  - if: ${{ ctx.targetFreight.origin.name == "guestbook" }}
    uses: yaml-update
    as: update-image
    config:
      path: ./out/apps/team-daniel/env/${{ ctx.stage }}/image.yaml
      updates:
      - key: image.tag
        value: ${{ imageFrom(vars.imageRepo).Tag }}
  - if: ${{ ctx.targetFreight.origin.name == "features" }}
    uses: git-clone
    config:
      repoURL: ${{ vars.gitRepo }}
      checkout:
      - commit: ${{ commitFrom(vars.gitRepo).ID }}
        path: ./features
  - if: ${{ ctx.targetFreight.origin.name == "features" }}
    uses: copy
    config:
      inPath: ./features/apps/team-daniel/base/feature-flags.yaml
      outPath: ./out/apps/team-daniel/env/${{ ctx.stage }}/feature-flags.yaml
  - uses: git-commit
    config:
      path: ./out
      message: "${{
        ctx.targetFreight.origin.name == 'guestbook' ?
        ctx.stage + ': deploy guestbook ' + imageFrom(vars.imageRepo).Tag :
        ctx.stage + ': update feature flags from ' + commitFrom(vars.gitRepo).ID
        }}"
  - uses: git-push
    config:
      path: ./out
      targetBranch: main
      pushPolicy: RebaseOrMerge
  - uses: argocd-update
    config:
      apps:
      - name: team-daniel-${{ ctx.stage }}
        sources:
        - repoURL: ${{ vars.gitRepo }}

---
apiVersion: kargo.akuity.io/v1alpha1
kind: PromotionTask
metadata:
  name: promote-config
  namespace: team-daniel
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  vars:
  - name: gitRepo
    value: https://github.com/akuity/sedemo-platform
  - name: targetEnv
  steps:
  - uses: argocd-update
    config:
      apps:
      - name: team-daniel-${{ vars.targetEnv }}
        sources:
        - repoURL: ${{ vars.gitRepo }}
