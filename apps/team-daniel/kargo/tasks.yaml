# =============================================================================
# PromotionTasks — team-daniel
# =============================================================================
# promote-frontend         rendered branch, frontend image only  (staging-frontend)
# promote-backend          rendered branch, api+worker images    (staging-backend)
# promote-all              rendered branch, all 3 images         (dev, integration)
# promote-with-pr          promote-all + PR gate                 (prod-us, prod-eu)
# promote-with-github-action  promote-all + GHA dispatch         (prod-global)
# =============================================================================

---
# PROMOTE-FRONTEND
# Renders only the frontend service manifests. Used by staging-frontend
# which carries warehouse-frontend freight only (no api/worker images in scope).
apiVersion: kargo.akuity.io/v1alpha1
kind: PromotionTask
metadata:
  name: promote-frontend
  namespace: team-daniel
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  vars:
  - name: gitRepo
    value: https://github.com/akuity/sedemo-platform
  - name: frontendImage
    value: ghcr.io/dhpup/guestbook
  steps:
  - uses: git-clone
    config:
      repoURL: ${{ vars.gitRepo }}
      checkout:
      - branch: main
        path: ./src
      - branch: stage/team-daniel/${{ ctx.stage }}
        create: true
        path: ./out
  - uses: git-clear
    config:
      path: ./out
  - uses: kustomize-set-image
    config:
      path: ./src/apps/team-daniel/stages/${{ ctx.stage }}
      images:
      - image: ${{ vars.frontendImage }}
        tag: ${{ imageFrom(vars.frontendImage).Tag }}
  - uses: kustomize-build
    config:
      path: ./src/apps/team-daniel/stages/${{ ctx.stage }}
      outPath: ./out/manifests.yaml
  - uses: git-commit
    config:
      path: ./out
      message: "chore(${{ ctx.stage }}): deploy frontend ${{ imageFrom(vars.frontendImage).Tag }}"
  - uses: git-push
    config:
      path: ./out
      targetBranch: stage/team-daniel/${{ ctx.stage }}
  - uses: argocd-update
    config:
      apps:
      - name: team-daniel-${{ ctx.stage }}

---
# PROMOTE-BACKEND
