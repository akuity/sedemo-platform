apiVersion: kargo.akuity.io/v1alpha1
kind: PromotionTask
metadata:
  name: promote-guestbook
  namespace: team-daniel
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  vars:
  - name: gitRepo
    value: https://github.com/akuity/sedemo-platform
  - name: imageRepo
    value: ghcr.io/akuity/guestbook
  steps:
  - if: ${{ ctx.targetFreight.origin.name != "config-dev" && ctx.targetFreight.origin.name != "config-prod" }}
    uses: git-clone
    config:
      repoURL: ${{ vars.gitRepo }}
      checkout:
      - branch: main
        path: ./out
  - if: ${{ ctx.targetFreight.origin.name == "guestbook" }}
    uses: yaml-update
    as: update-image
    config:
      path: ./out/apps/team-daniel/env/${{ ctx.stage }}/image.yaml
      updates:
      - key: image.tag
        value: ${{ imageFrom(vars.imageRepo).Tag }}
  - if: ${{ ctx.targetFreight.origin.name == "features" }}
    uses: git-clone
    config:
      repoURL: ${{ vars.gitRepo }}
      checkout:
      - branch: main
        path: ./features
  - if: ${{ ctx.targetFreight.origin.name == "features" }}
    uses: copy
    config:
      inPath: ./features/apps/team-daniel/base/feature-flags.yaml
      outPath: ./out/apps/team-daniel/env/${{ ctx.stage }}/feature-flags.yaml
  - if: ${{ ctx.targetFreight.origin.name == "guestbook" || ctx.targetFreight.origin.name == "features" }}
    uses: git-commit
    as: commit
    config:
      path: ./out
      message: "${{ ctx.stage }}: promote ${{ ctx.targetFreight.origin.name }}"
  - if: ${{ ctx.targetFreight.origin.name == "guestbook" || ctx.targetFreight.origin.name == "features" }}
    uses: git-push
    config:
      path: ./out
      targetBranch: main
  - uses: argocd-update
    config:
      apps:
      - name: team-daniel-${{ ctx.stage }}
        sources:
        - repoURL: ${{ vars.gitRepo }}
          desiredRevision: ${{ outputs.commit.commit }}
          updateTargetRevision: true

---
apiVersion: kargo.akuity.io/v1alpha1
kind: PromotionTask
metadata:
  name: pr-promote-prod-canary
  namespace: team-daniel
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  vars:
  - name: gitRepo
    value: https://github.com/akuity/sedemo-platform
  - name: imageRepo
    value: ghcr.io/akuity/guestbook
  - name: freightOrigin
    value: ""
  steps:
  - if: ${{ vars.freightOrigin == "guestbook" }}
    uses: yaml-update
    config:
      path: ./out/apps/team-daniel/env/prod-canary/image.yaml
      updates:
      - key: image.tag
        value: ${{ imageFrom(vars.imageRepo).Tag }}
  - if: ${{ vars.freightOrigin == "features" }}
    uses: git-clone
    config:
      repoURL: ${{ vars.gitRepo }}
      checkout:
      - branch: main
        path: ./features
  - if: ${{ vars.freightOrigin == "features" }}
    uses: copy
    config:
      inPath: ./features/apps/team-daniel/base/feature-flags.yaml
      outPath: ./out/apps/team-daniel/env/prod-canary/feature-flags.yaml
  - if: ${{ vars.freightOrigin == "guestbook" }}
    uses: git-commit
    config:
      path: ./out
      message: "prod-canary: deploy guestbook ${{ imageFrom(vars.imageRepo).Tag }}"
  - if: ${{ vars.freightOrigin == "features" }}
    uses: git-commit
    config:
      path: ./out
      message: "prod-canary: update feature flags"
  - if: ${{ vars.freightOrigin == "guestbook" || vars.freightOrigin == "features" }}
    uses: git-push
    as: push
    config:
      path: ./out
      generateTargetBranch: true
  - if: ${{ vars.freightOrigin == "guestbook" || vars.freightOrigin == "features" }}
    uses: git-open-pr
    as: open-pr
    config:
      repoURL: ${{ vars.gitRepo }}
      sourceBranch: ${{ task.outputs.push.branch }}
      targetBranch: main
      description: "${{ vars.freightOrigin == 'guestbook' ? 'Canary deploy: guestbook ' + imageFrom(vars.imageRepo).Tag + ' to prod-canary. Rollout strategy: 20% traffic for 1 min, then 100%.' : 'Feature flags update: promoting latest feature-flags.yaml to prod-canary.' }}"
  - if: ${{ status('open-pr') != 'Skipped' }}
    uses: git-wait-for-pr
    config:
      repoURL: ${{ vars.gitRepo }}
      prNumber: ${{ task.outputs['open-pr'].pr.id }}
