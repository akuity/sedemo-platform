    value: https://github.com/akuity/sedemo-platform
  - name: frontendImage
    value: ghcr.io/dhpup/guestbook
  - name: apiImage
    value: ghcr.io/dhpup/guestbook-api
  - name: workerImage
    value: ghcr.io/dhpup/guestbook-worker
  steps:
  - uses: git-clone
    config:
      repoURL: ${{ vars.gitRepo }}
      checkout:
      - branch: main
        path: ./src
      - branch: stage/team-daniel/${{ ctx.stage }}
        create: true
        path: ./out
  - uses: git-clear
    config:
      path: ./out
  - uses: kustomize-set-image
    config:
      path: ./src/apps/team-daniel/stages/${{ ctx.stage }}
      images:
      - image: ${{ vars.frontendImage }}
        tag: ${{ imageFrom(vars.frontendImage).Tag }}
      - image: ${{ vars.apiImage }}
        tag: ${{ imageFrom(vars.apiImage).Tag }}
      - image: ${{ vars.workerImage }}
        tag: ${{ imageFrom(vars.workerImage).Tag }}
  - uses: kustomize-build
    config:
