      - name: team-daniel-${{ ctx.stage }}

---
# PROMOTE-WITH-PR
# PR-based promotion with all three services. Used by prod-us and prod-eu.
# Merging the PR is the manual approval signal.
apiVersion: kargo.akuity.io/v1alpha1
kind: PromotionTask
metadata:
  name: promote-with-pr
  namespace: team-daniel
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  vars:
  - name: gitRepo
    value: https://github.com/akuity/sedemo-platform
  - name: frontendImage
    value: ghcr.io/dhpup/guestbook
  - name: apiImage
    value: ghcr.io/dhpup/guestbook-api
  - name: workerImage
    value: ghcr.io/dhpup/guestbook-worker
  steps:
  - uses: git-clone
    config:
      repoURL: ${{ vars.gitRepo }}
      checkout:
      - branch: main
        path: ./src
      - branch: stage/team-daniel/${{ ctx.stage }}
        create: true
        path: ./out
  - uses: git-clear
    config:
      path: ./out
  - uses: kustomize-set-image
    config:
      path: ./src/apps/team-daniel/stages/${{ ctx.stage }}
      images:
      - image: ${{ vars.frontendImage }}
        tag: ${{ imageFrom(vars.frontendImage).Tag }}
      - image: ${{ vars.apiImage }}
        tag: ${{ imageFrom(vars.apiImage).Tag }}
      - image: ${{ vars.workerImage }}
        tag: ${{ imageFrom(vars.workerImage).Tag }}
  - uses: kustomize-build
    config:
      path: ./src/apps/team-daniel/stages/${{ ctx.stage }}
      outPath: ./out/manifests.yaml
  - uses: git-commit
    as: commit
    config:
      path: ./out
      message: "chore(${{ ctx.stage }}): promote frontend=${{ imageFrom(vars.frontendImage).Tag }} api=${{ imageFrom(vars.apiImage).Tag }}"
  - uses: git-push
    as: push
    config:
      path: ./out
      generateTargetBranch: true
  - uses: git-open-pr
    as: openpr
    config:
      repoURL: ${{ vars.gitRepo }}
      createTargetBranch: true
      sourceBranch: ${{ task.outputs['push'].branch }}
      targetBranch: stage/team-daniel/${{ ctx.stage }}
  - uses: git-wait-for-pr
    config:
      repoURL: ${{ vars.gitRepo }}
      prNumber: ${{ task.outputs['openpr'].pr.id }}
  - uses: argocd-update
    config:
      apps:
      - name: team-daniel-${{ ctx.stage }}

---
# PROMOTE-WITH-GITHUB-ACTION
# GHA dispatch as final production gate. Used by prod-global.
# Triggers an external workflow (integration tests, change-ticket automation)
# and blocks until the run completes successfully.
apiVersion: kargo.akuity.io/v1alpha1
kind: PromotionTask
metadata:
  name: promote-with-github-action
  namespace: team-daniel
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  vars:
  - name: gitRepo
    value: https://github.com/akuity/sedemo-platform
  - name: frontendImage
    value: ghcr.io/dhpup/guestbook
  - name: apiImage
    value: ghcr.io/dhpup/guestbook-api
  - name: workerImage
    value: ghcr.io/dhpup/guestbook-worker
  - name: githubtoken
    value: githubtoken
  steps:
  - uses: git-clone
    config:
      repoURL: ${{ vars.gitRepo }}
      checkout:
      - branch: main
        path: ./src
      - branch: stage/team-daniel/${{ ctx.stage }}
        create: true
        path: ./out
  - uses: git-clear
    config:
      path: ./out
  - uses: kustomize-set-image
    config:
      path: ./src/apps/team-daniel/stages/${{ ctx.stage }}
      images:
      - image: ${{ vars.frontendImage }}
        tag: ${{ imageFrom(vars.frontendImage).Tag }}
      - image: ${{ vars.apiImage }}
        tag: ${{ imageFrom(vars.apiImage).Tag }}
      - image: ${{ vars.workerImage }}
        tag: ${{ imageFrom(vars.workerImage).Tag }}
  - uses: kustomize-build
    config:
      path: ./src/apps/team-daniel/stages/${{ ctx.stage }}
      outPath: ./out/manifests.yaml
  - uses: git-commit
    config:
      path: ./out
      message: "chore(${{ ctx.stage }}): promote frontend=${{ imageFrom(vars.frontendImage).Tag }} api=${{ imageFrom(vars.apiImage).Tag }}"
  - uses: git-push
    config:
      path: ./out
      targetBranch: stage/team-daniel/${{ ctx.stage }}
  - uses: gha-dispatch-workflow
    as: dispatch
    config:
      credentials:
        secretName: ${{ vars.githubtoken }}
      owner: akuity
      repo: sedemo-platform
      workflowFile: team-daniel-deploy.yml
      ref: main
      inputs:
        environment: ${{ ctx.stage }}
        frontend: ${{ imageFrom(vars.frontendImage).Tag }}
        api: ${{ imageFrom(vars.apiImage).Tag }}
  - uses: gha-wait-for-workflow
    config:
      credentials:
        secretName: ${{ vars.githubtoken }}
      owner: akuity
      repo: sedemo-platform
      runID: ${{ task.outputs['dispatch'].runID }}
  - uses: argocd-update
    config:
      apps:
      - name: team-daniel-${{ ctx.stage }}
