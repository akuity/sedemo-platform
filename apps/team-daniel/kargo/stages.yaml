---
# DEV — shared integration sandbox
# Requests freight from all four warehouses simultaneously. Any warehouse
# publishing new freight makes this stage eligible for auto-promotion.
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev
  namespace: team-daniel
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    kargo.akuity.io/color: gray
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: warehouse-frontend
    sources:
      direct: true
  - origin:
      kind: Warehouse
      name: warehouse-checkout
    sources:
      direct: true
  - origin:
      kind: Warehouse
      name: warehouse-catalog
    sources:
      direct: true
  - origin:
      kind: Warehouse
      name: warehouse-cart
    sources:
      direct: true
  promotionTemplate:
    spec:
      steps:
      - task:
          name: promote-online-boutique

---
# PROD — manual promotion gate
# Requests the same freight from all four warehouses, sourced through dev.
# Freight must have passed dev before it is eligible here.
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: prod
  namespace: team-daniel
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    kargo.akuity.io/color: green
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: warehouse-frontend
    sources:
      stages:
      - dev
  - origin:
      kind: Warehouse
      name: warehouse-checkout
    sources:
      stages:
      - dev
  - origin:
      kind: Warehouse
      name: warehouse-catalog
    sources:
      stages:
      - dev
  - origin:
      kind: Warehouse
      name: warehouse-cart
    sources:
      stages:
      - dev
  promotionTemplate:
    spec:
      steps:
      - uses: trivy-image
        as: trivy-frontend
        config:
          image: us-central1-docker.pkg.dev/google-samples/microservices-demo/frontend:${{ imageFrom("us-central1-docker.pkg.dev/google-samples/microservices-demo/frontend").Tag }}
      - uses: trivy-image
        as: trivy-checkoutservice
        config:
          image: us-central1-docker.pkg.dev/google-samples/microservices-demo/checkoutservice:${{ imageFrom("us-central1-docker.pkg.dev/google-samples/microservices-demo/checkoutservice").Tag }}
      - uses: trivy-image
        as: trivy-productcatalogservice
        config:
          image: us-central1-docker.pkg.dev/google-samples/microservices-demo/productcatalogservice:${{ imageFrom("us-central1-docker.pkg.dev/google-samples/microservices-demo/productcatalogservice").Tag }}
      - uses: trivy-image
        as: trivy-cartservice
        config:
          image: us-central1-docker.pkg.dev/google-samples/microservices-demo/cartservice:${{ imageFrom("us-central1-docker.pkg.dev/google-samples/microservices-demo/cartservice").Tag }}
      - task:
          name: promote-online-boutique
