---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev
  namespace: team-daniel
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    kargo.akuity.io/color: gray
    kargo.akuity.io/argocd-context: '[{"name":"team-daniel-dev","namespace":"argocd"}]'
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: guestbook
    sources:
      direct: true
  - origin:
      kind: Warehouse
      name: features
    sources:
      direct: true
  - origin:
      kind: Warehouse
      name: config-dev
    sources:
      direct: true
  promotionTemplate:
    spec:
      steps:
      - uses: git-clone
        config:
          repoURL: https://github.com/akuity/sedemo-platform
          checkout:
          - branch: main
            path: ./src
      - uses: helm-template
        config:
          path: ./src/apps/team-daniel/charts/guestbook
          releaseName: guestbook
          valuesFiles:
          - ./src/apps/team-daniel/env/${{ ctx.stage }}/config.yaml
          - ./src/apps/team-daniel/env/${{ ctx.stage }}/image.yaml
          outPath: ./rendered
      - uses: opa-test
        continueOnError: true
        config:
          path: ./rendered
      - task:
          name: promote-guestbook
      - uses: teams-notify
        config:
          webhookURL: ${{ secret("teams-webhook")["teams-webhook"] }}
          title: "Promoted to ${{ ctx.stage }}"
          message: "${{ ctx.targetFreight.origin.name == 'guestbook' ? 'Deployed guestbook ' + imageFrom('ghcr.io/akuity/guestbook').Tag + ' — OPA policy check passed (informational)' : ctx.targetFreight.origin.name == 'features' ? 'Feature flags updated in dev' : 'Dev environment configuration updated' }}"
          stage: ${{ ctx.stage }}
          freight: ${{ ctx.targetFreight.name }}

---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: staging-security
  namespace: team-daniel
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    kargo.akuity.io/color: amber
    kargo.akuity.io/argocd-context: '[{"name":"team-daniel-staging-security","namespace":"argocd"}]'
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: guestbook
    sources:
      stages:
      - dev
  - origin:
      kind: Warehouse
      name: features
    sources:
      stages:
      - dev
  - origin:
      kind: Warehouse
      name: config-staging-security
    sources:
      direct: true
  promotionTemplate:
    spec:
      steps:
      - uses: git-clone
        config:
          repoURL: https://github.com/akuity/sedemo-platform
          checkout:
          - branch: main
            path: ./src
      - uses: helm-template
        config:
          path: ./src/apps/team-daniel/charts/guestbook
          releaseName: guestbook
          valuesFiles:
          - ./src/apps/team-daniel/env/${{ ctx.stage }}/config.yaml
          - ./src/apps/team-daniel/env/${{ ctx.stage }}/image.yaml
          outPath: ./rendered
      - uses: opa-test
        config:
          path: ./rendered
      - uses: trivy-image
        config:
          image: ghcr.io/akuity/guestbook:${{ imageFrom('ghcr.io/akuity/guestbook').Tag }}
      - uses: gha-dispatch-workflow
        as: gha-dispatch
        config:
          repoURL: https://github.com/akuity/sedemo-platform
          workflowFile: example-github-action.yaml
          ref: main
          inputs:
            environment: ${{ ctx.stage }}
            version: ${{ imageFrom('ghcr.io/akuity/guestbook').Tag }}
      - uses: gha-wait-for-workflow
        config:
          repoURL: https://github.com/akuity/sedemo-platform
          runID: ${{ outputs['gha-dispatch'].runID }}
          expectedConclusion: success
      - task:
          name: promote-guestbook
      - uses: teams-notify
        config:
          webhookURL: ${{ secret("teams-webhook")["teams-webhook"] }}
          title: "Security Gates Passed — ${{ ctx.stage }}"
          message: "${{ ctx.targetFreight.origin.name == 'guestbook' ? 'guestbook ' + imageFrom('ghcr.io/akuity/guestbook').Tag + ' cleared all gates: OPA policy OK, Trivy no critical CVEs, GHA integration tests OK' : 'Feature flags promoted through staging-security checks' }}"
          stage: ${{ ctx.stage }}
          freight: ${{ ctx.targetFreight.name }}

---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: staging
  namespace: team-daniel
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    kargo.akuity.io/color: blue
    kargo.akuity.io/argocd-context: '[{"name":"team-daniel-staging","namespace":"argocd"}]'
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: guestbook
    sources:
      stages:
      - dev
  - origin:
      kind: Warehouse
      name: features
    sources:
      stages:
      - dev
  - origin:
      kind: Warehouse
      name: config-staging
    sources:
      direct: true
  verification:
    analysisTemplates:
    - name: staging-analysis
  promotionTemplate:
    spec:
      steps:
      - task:
          name: promote-guestbook
      - uses: teams-notify
        config:
          webhookURL: ${{ secret("teams-webhook")["teams-webhook"] }}
          title: "Promoted to ${{ ctx.stage }}"
          message: "${{ ctx.targetFreight.origin.name == 'guestbook' ? 'guestbook ' + imageFrom('ghcr.io/akuity/guestbook').Tag + ' deployed to staging — Kargo verification analysis running' : ctx.targetFreight.origin.name == 'features' ? 'Feature flags promoted to staging' : 'Staging configuration updated' }}"
          stage: ${{ ctx.stage }}
          freight: ${{ ctx.targetFreight.name }}

---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: prod-canary
  namespace: team-daniel
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    kargo.akuity.io/color: green
    kargo.akuity.io/argocd-context: '[{"name":"team-daniel-prod-canary","namespace":"argocd"}]'
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: guestbook
    sources:
      stages:
      - staging
  - origin:
      kind: Warehouse
      name: features
    sources:
      stages:
      - staging
  - origin:
      kind: Warehouse
      name: config-prod-canary
    sources:
      direct: true
  promotionTemplate:
    spec:
      steps:
      - uses: git-clone
        config:
          repoURL: https://github.com/akuity/sedemo-platform
          checkout:
          - branch: main
            path: ./out
      - task:
          name: pr-promote-prod-canary
        vars:
        - name: freightOrigin
          value: ${{ ctx.targetFreight.origin.name }}
      - uses: argocd-update
        config:
          apps:
          - name: team-daniel-prod-canary
            sources:
            - repoURL: https://github.com/akuity/sedemo-platform
      - uses: teams-notify
        config:
          webhookURL: ${{ secret("teams-webhook")["teams-webhook"] }}
          title: "Canary Initiated — ${{ ctx.stage }}"
          message: "${{ ctx.targetFreight.origin.name == 'guestbook' ? 'Canary rollout started: guestbook ' + imageFrom('ghcr.io/akuity/guestbook').Tag + ' at 20% traffic, auto-promotes to 100% after 1 min' : ctx.targetFreight.origin.name == 'features' ? 'Feature flags updated in prod-canary via PR gate' : 'Production canary configuration updated' }}"
          stage: ${{ ctx.stage }}
          freight: ${{ ctx.targetFreight.name }}
