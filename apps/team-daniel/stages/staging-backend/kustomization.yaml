apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# API + worker services — this stage carries warehouse-backend freight
# which tracks both images together as a backend bundle.
resources:
- ../../services/api
- ../../services/worker

images:
- name: ghcr.io/dhpup/guestbook-api
  newTag: latest
- name: ghcr.io/dhpup/guestbook-worker
  newTag: latest
