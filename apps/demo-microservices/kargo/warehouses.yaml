apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: backend-group
  namespace: kargo-microservices
spec:
  subscriptions:
  - image:
      repoURL: us-central1-docker.pkg.dev/google-samples/microservices-demo/cartservice
  - image:
      repoURL: us-central1-docker.pkg.dev/google-samples/microservices-demo/checkoutservice
  - image:
      repoURL: us-central1-docker.pkg.dev/google-samples/microservices-demo/currencyservice
  - image:
      repoURL: us-central1-docker.pkg.dev/google-samples/microservices-demo/emailservice
  - image:
      repoURL: us-central1-docker.pkg.dev/google-samples/microservices-demo/paymentservice
  - image:
      repoURL: us-central1-docker.pkg.dev/google-samples/microservices-demo/productcatalogservice
  - image:
      repoURL: us-central1-docker.pkg.dev/google-samples/microservices-demo/shippingservice
