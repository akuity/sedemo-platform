apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: demo-snow
  namespace: demo-snow
spec:
  subscriptions:
  - image:
      repoURL: ghcr.io/akuity/sedemo-monorepo-snow-demo
      discoveryLimit: 5
      imageSelectionStrategy: NewestBuild
      allowTags: ^\d*-[a-z]*$
  - git:
      repoURL: https://github.com/akuity/sedemo-monorepo
      includePaths:
      - verification-snow-demo