# Per-stage throwaway Postgres. The flyway-migrate promotion step owns the
# schema; nothing here seeds tables.
#
# emptyDir on purpose: this cluster has no CSI driver / default StorageClass
# (Prometheus also runs with persistence disabled), so a PVC would stay
# Pending forever. Tradeoff: a db pod restart wipes the schema; re-promote the
# stage's current Freight and Flyway rebuilds it from scratch.
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
stringData:
  username: {{ .Values.db.user }}
  password: {{ .Values.db.password }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: {{ .Values.db.name }}
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: username
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        readinessProbe:
          exec:
            command: [pg_isready, -U, {{ .Values.db.user }}, -d, {{ .Values.db.name }}]
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            memory: 256Mi
      volumes:
      - name: data
        emptyDir:
          sizeLimit: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: db
spec:
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: db
