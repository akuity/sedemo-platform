apiVersion: apps/v1
kind: Deployment
metadata:
  name: dbr-app
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: dbr-app
  template:
    metadata:
      labels:
        app: dbr-app
        app.kubernetes.io/version: "{{ .Values.image.tag }}"
    spec:
      containers:
      - name: app
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: dbr-app
spec:
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: dbr-app
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dbr-app
spec:
  ingressClassName: nginx
  rules:
  - host: "{{ .Values.hostPrefix }}.{{ .Values.ingress.rootDomain }}"
    http:
      paths:
      - pathType: Prefix
        path: /
        backend:
          service:
            name: dbr-app
            port:
              number: 80
