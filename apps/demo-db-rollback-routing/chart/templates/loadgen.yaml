{{- if .Values.loadgen.enabled }}
# Steady traffic through the ingress so nginx_ingress_controller_requests
# always has samples for the error-rate verification. Goes through the public
# hostname on purpose; hitting the Service directly would bypass the ingress
# metrics that verification queries. Hits /color (not /), the only endpoint
# that honors the baked-in ERROR_RATE; POSTing to / just serves static files
# and always returns 2xx, which would decouple the metric from app health.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loadgen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loadgen
  template:
    metadata:
      labels:
        app: loadgen
    spec:
      containers:
      - name: loadgen
        image: httpd:2.4-alpine
        command:
        - /bin/sh
        - -c
        - |
          while true; do
            ab -n10 -mPOST -p /dev/null -T application/json "https://{{ .Values.hostPrefix }}.{{ .Values.ingress.rootDomain }}/color" >/dev/null 2>&1
            sleep 5
          done
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            memory: 32Mi
{{- end }}
