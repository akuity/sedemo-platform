replicaCount: 1

image:
  repository: ghcr.io/akuity/sedemo-monorepo-rollouts-app
  tag: latest
  pullPolicy: IfNotPresent

# Per-env overrides live in env/<stage>/config.yaml.
# App is served at <hostPrefix>.<rootDomain>, schema viewer at
# <hostPrefix>-schema.<rootDomain>.
