ingress:
  rootDomain: akpdemoapps.link

db:
  name: appdb
  user: app
  # Demo-only credential; matches secrets/flyway-db-secret.yaml.
  password: kargodemo1

pgweb:
  enabled: true

loadgen:
  enabled: true
