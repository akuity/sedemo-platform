# ─────────────────────────────────────────────────────────────────────────────
# STAGES
#
# AXIS 1 (shared lifecycle): dev -> uat -> prod, a linear pipeline off the
#   `defaults-release` Warehouse. Each stage runs the promote-defaults task, which
#   edits ONLY versions/defaults/<stage>.yaml.
#
# AXIS 2 (tenant overrides): one standalone *-tenant-overrides stage PER TIER, each
#   off its own tenant Warehouse. Each takes tenant input directly at its tier and
#   never participates in dev -> uat -> prod. The tenant stages do not chain to each
#   other either — dev/uat/prod tenants are independent sets.
# ─────────────────────────────────────────────────────────────────────────────

# ── AXIS 1: dev (entry — direct from the Warehouse, auto-promoted) ──────────────
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev
  namespace: demo-tenant-overrides
  annotations:
    kargo.akuity.io/color: gray
spec:
  shard: sedemo-primary
  requestedFreight:
  - origin:
      kind: Warehouse
      name: defaults-release
    sources:
      direct: true
  promotionTemplate:
    spec:
      steps:
      - task:
          name: promote-defaults
        vars:
        - name: stage
          value: dev
---
# ── AXIS 1: uat (promotes from dev; gated by verification) ──────────────────────
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: uat
  namespace: demo-tenant-overrides
  annotations:
    kargo.akuity.io/color: blue
spec:
  shard: sedemo-primary
  requestedFreight:
  - origin:
      kind: Warehouse
      name: defaults-release
    sources:
      stages:
      - dev
  verification:
    analysisTemplates:
    - name: healthy-sync-check
  promotionTemplate:
    spec:
      steps:
      - task:
          name: promote-defaults
        vars:
        - name: stage
          value: uat
---
# ── AXIS 1: prod (promotes from uat; gated by verification) ─────────────────────
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: prod
  namespace: demo-tenant-overrides
  annotations:
    kargo.akuity.io/color: green
spec:
  shard: sedemo-primary
  requestedFreight:
  - origin:
      kind: Warehouse
      name: defaults-release
    sources:
      stages:
      - uat
  verification:
    analysisTemplates:
    - name: healthy-sync-check
  promotionTemplate:
    spec:
      steps:
      - task:
          name: promote-defaults
        vars:
        - name: stage
          value: prod
---
# ── AXIS 2: per-tier tenant-override stages (INDEPENDENT of the linear lifecycle) ─
# Each is off a SEPARATE Warehouse (tenant-overrides-<tier>, a git subscription on
# that tier's override files). Freight is created when a tenant pin changes. The
# promotion does NOT edit defaults and does NOT rewrite the override files — it only
# syncs that tier's affected tenant instances, health-gated. Tenant input enters at
# its tier and goes nowhere else; the tenant stages don't chain to each other.

# dev tier — tenant "alpha"
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev-tenant-overrides
  namespace: demo-tenant-overrides
  annotations:
    kargo.akuity.io/color: amber
spec:
  shard: sedemo-primary
  requestedFreight:
  - origin:
      kind: Warehouse
      name: tenant-overrides-dev
    sources:
      direct: true
  promotionTemplate:
    spec:
      vars:
      - name: gitRepo
        value: https://github.com/akuity/sedemo-platform
      - name: src
        value: ./src
      steps:
      - uses: git-clone
        config:
          repoURL: ${{ vars.gitRepo }}
          checkout:
          - branch: main
            path: ${{ vars.src }}
      # No edit step: override files are authored by humans/CI; this stage only rolls
      # them out, gating on real health. Sync the dev tenant instances.
      - uses: argocd-update
        config:
          apps:
          - name: app-dev-tenant-alpha
            namespace: argocd
---
# uat tier — tenant "bravo"
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: uat-tenant-overrides
  namespace: demo-tenant-overrides
  annotations:
    kargo.akuity.io/color: amber
spec:
  shard: sedemo-primary
  requestedFreight:
  - origin:
      kind: Warehouse
      name: tenant-overrides-uat
    sources:
      direct: true
  promotionTemplate:
    spec:
      vars:
      - name: gitRepo
        value: https://github.com/akuity/sedemo-platform
      - name: src
        value: ./src
      steps:
      - uses: git-clone
        config:
          repoURL: ${{ vars.gitRepo }}
          checkout:
          - branch: main
            path: ${{ vars.src }}
      # No edit step: override files are authored by humans/CI; this stage only rolls
      # them out, gating on real health. Sync the uat tenant instances.
      - uses: argocd-update
        config:
          apps:
          - name: app-uat-tenant-bravo
            namespace: argocd
---
# prod tier — tenants "charlie", "delta", "echo"
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: prod-tenant-overrides
  namespace: demo-tenant-overrides
  annotations:
    kargo.akuity.io/color: amber
spec:
  shard: sedemo-primary
  requestedFreight:
  - origin:
      kind: Warehouse
      name: tenant-overrides-prod
    sources:
      direct: true
  promotionTemplate:
    spec:
      vars:
      - name: gitRepo
        value: https://github.com/akuity/sedemo-platform
      - name: src
        value: ./src
      steps:
      - uses: git-clone
        config:
          repoURL: ${{ vars.gitRepo }}
          checkout:
          - branch: main
            path: ${{ vars.src }}
      # No edit step: override files are authored by humans/CI; this stage only rolls
      # them out, gating on real health. Sync the prod tenant instances.
      - uses: argocd-update
        config:
          apps:
          - name: app-prod-tenant-charlie
            namespace: argocd
          - name: app-prod-tenant-delta
            namespace: argocd
          - name: app-prod-tenant-echo
            namespace: argocd
---
# ── AXIS 2: prod-tenant-flagship — DEDICATED LANE for one high-value tenant ──────
# Same shape as the grouped tenant stages, but off its own Warehouse and syncing a
# single tenant app. Because it has its own Warehouse + Stage, "flagship" shows up as
# its own node in the Kargo pipeline graph and promotes independently of everything
# else. This is the per-tenant granularity for tenants that warrant it — used here
# for ONE, not all 140 (see README on scale).
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: prod-tenant-flagship
  namespace: demo-tenant-overrides
  annotations:
    kargo.akuity.io/color: violet
spec:
  shard: sedemo-primary
  requestedFreight:
  - origin:
      kind: Warehouse
      name: tenant-flagship-prod
    sources:
      direct: true
  promotionTemplate:
    spec:
      vars:
      - name: gitRepo
        value: https://github.com/akuity/sedemo-platform
      - name: src
        value: ./src
      steps:
      - uses: git-clone
        config:
          repoURL: ${{ vars.gitRepo }}
          checkout:
          - branch: main
            path: ${{ vars.src }}
      # No edit step: the override file is authored by humans/CI; this stage only
      # rolls it out, gating on real health. Sync the flagship tenant instance.
      - uses: argocd-update
        config:
          apps:
          - name: app-prod-tenant-flagship
            namespace: argocd
