apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: demo-tenant-overrides
  namespace: argocd
spec:
  description: One Helm chart, many instances — shared-lifecycle defaults + per-tenant overrides
  sourceRepos:
    - '*'
  destinations:
    - server: '*'
      name: '*'
      namespace: '*'
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
