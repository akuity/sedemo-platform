apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: demo-downstream
  namespace: argocd
spec:
  generators:
  - git:
      repoURL: https://github.com/akuity/sedemo-platform
      revision: HEAD
      files:
      - path: apps/demo-downstream/config/instances/*.yaml
  template:
    metadata:
      name: downstream-{{customer}}-{{region}}-{{env}}
      annotations:
        kargo.akuity.io/authorized-stage: demo-downstream:{{stage}}
        notifications.argoproj.io/subscriptions: |
          - trigger: [on-sync-succeeded, on-sync-running]
            destinations:
              - service: sedemo
                recipients: [argo-notifications]
    spec:
      project: demo-downstream
      source:
        repoURL: https://github.com/akuity/sedemo-platform
        path: apps/demo-downstream/rendered/{{customer}}/{{region}}/{{env}}
      destination:
        name: sedemo-primary
        namespace: downstream-{{customer}}-{{region}}-{{env}}
      syncPolicy:
        automated:
          prune: true
          enabled: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
