---
# Source: downstream/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: customer-b-us-east-config
  namespace: demo-downstream-dev
  labels:
    app.kubernetes.io/name: downstream
    app.kubernetes.io/instance: customer-b-us-east
data:
  customer-id: "crd-0002"
  customer-tier: "premium"
  region: "us-east"
  datacenter: "nyc"
  env: "dev"
  log-level: "debug"
  max-connections: "500"
  feature-advanced-analytics: "true"
  feature-risk-engine: "v1"
  feature-compliance-mode: "standard"
---
# Source: downstream/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: customer-b-us-east
  namespace: demo-downstream-dev
  labels:
    app.kubernetes.io/name: downstream
    app.kubernetes.io/instance: customer-b-us-east
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  selector:
    app: customer-b-us-east
---
# Source: downstream/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-b-us-east
  namespace: demo-downstream-dev
  labels:
    app.kubernetes.io/name: downstream
    app.kubernetes.io/instance: customer-b-us-east
spec:
  replicas: 0
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: customer-b-us-east
  template:
    metadata:
      labels:
        app: customer-b-us-east
    spec:
      containers:
      - name: guestbook
        image: "ghcr.io/akuity/guestbook:v0.0.2"
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 200m
            memory: 256Mi
        envFrom:
        - configMapRef:
            name: customer-b-us-east-config
