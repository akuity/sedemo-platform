---
# Source: downstream/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: customer-c-eu-west-config
  namespace: demo-downstream-prod
  labels:
    app.kubernetes.io/name: downstream
    app.kubernetes.io/instance: customer-c-eu-west
data:
  customer-id: "crd-0003"
  customer-tier: "enterprise"
  region: "eu-west"
  datacenter: "lon"
  env: "prod"
  log-level: "warn"
  max-connections: "1000"
  feature-advancedAnalytics: "true"
  feature-complianceMode: "gdpr"
  feature-lattedog: "false"
  feature-momodog: "true"
  feature-riskEngine: "v2"
---
# Source: downstream/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: customer-c-eu-west
  namespace: demo-downstream-prod
  labels:
    app.kubernetes.io/name: downstream
    app.kubernetes.io/instance: customer-c-eu-west
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  selector:
    app: customer-c-eu-west
---
# Source: downstream/templates/rollout.yaml
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: e2e-verification
  namespace: demo-downstream-prod
spec:
  metrics:
  - name: test
    provider:
      job:
        spec:
          backoffLimit: 1
          template:
            spec:
              restartPolicy: Never
              containers:
              - name: test
                image: alpine:latest
                command: ["/bin/sh", "-c"]
                args:
                - 'for i in $(seq 1 5); do echo "Verification Step $i of 5"; sleep 2; if [ $i -eq 4 ]; then echo -e "\tFAIL - assertion error: unexpected response code"; exit 1; else echo -e "\tPASS"; fi; done'
---
# Source: downstream/templates/rollout.yaml
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: customer-c-eu-west
  namespace: demo-downstream-prod
  labels:
    app.kubernetes.io/name: downstream
    app.kubernetes.io/instance: customer-c-eu-west
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: customer-c-eu-west
  template:
    metadata:
      labels:
        app: customer-c-eu-west
    spec:
      containers:
      - name: guestbook
        image: "ghcr.io/akuity/guestbook:v0.0.2"
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: 1000m
            memory: 1Gi
          requests:
            cpu: 500m
            memory: 512Mi
        envFrom:
        - configMapRef:
            name: customer-c-eu-west-config
  strategy:
    canary:
      steps:
      - setWeight: 50
      - analysis:
          templates:
          - templateName: e2e-verification
      - setWeight: 100
