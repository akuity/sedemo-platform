---
# Source: downstream/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: instance-config
  namespace: downstream-customer-c-eu-west-prod
  labels:
    app.kubernetes.io/name: downstream
    app.kubernetes.io/instance: downstream
data:
  customer-id: "crd-0003"
  customer-tier: "enterprise"
  region: "eu-west"
  datacenter: "lon"
  env: "prod"
  log-level: "warn"
  max-connections: "1000"
  feature-advanced-analytics: "true"
  feature-risk-engine: "v2"
  feature-compliance-mode: "gdpr"
---
# Source: downstream/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: guestbook
  namespace: downstream-customer-c-eu-west-prod
  labels:
    app.kubernetes.io/name: downstream
    app.kubernetes.io/instance: downstream
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  selector:
    app: guestbook
---
# Source: downstream/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: guestbook
  namespace: downstream-customer-c-eu-west-prod
  labels:
    app.kubernetes.io/name: downstream
    app.kubernetes.io/instance: downstream
spec:
  replicas: 0
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: guestbook
  template:
    metadata:
      labels:
        app: guestbook
    spec:
      containers:
      - name: guestbook
        image: "ghcr.io/akuity/guestbook:v0.0.2"
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: 1000m
            memory: 1Gi
          requests:
            cpu: 500m
            memory: 512Mi
        envFrom:
        - configMapRef:
            name: instance-config
