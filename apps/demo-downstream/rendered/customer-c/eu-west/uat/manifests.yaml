---
# Source: downstream/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: customer-c-eu-west-config
  namespace: demo-downstream-uat
  labels:
    app.kubernetes.io/name: downstream
    app.kubernetes.io/instance: customer-c-eu-west
data:
  customer-id: "crd-0003"
  customer-tier: "enterprise"
  region: "eu-west"
  datacenter: "lon"
  env: "uat"
  log-level: "info"
  max-connections: "1000"
  feature-advancedAnalytics: "true"
  feature-complianceMode: "gdpr"
  feature-lattedog: "false"
  feature-momodog: "false"
  feature-riskEngine: "v2"
---
# Source: downstream/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: customer-c-eu-west
  namespace: demo-downstream-uat
  labels:
    app.kubernetes.io/name: downstream
    app.kubernetes.io/instance: customer-c-eu-west
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  selector:
    app: customer-c-eu-west
---
# Source: downstream/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-c-eu-west
  namespace: demo-downstream-uat
  labels:
    app.kubernetes.io/name: downstream
    app.kubernetes.io/instance: customer-c-eu-west
spec:
  replicas: 0
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: customer-c-eu-west
  template:
    metadata:
      labels:
        app: customer-c-eu-west
    spec:
      containers:
      - name: guestbook
        image: "ghcr.io/akuity/guestbook:v0.0.2"
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: 1000m
            memory: 1Gi
          requests:
            cpu: 500m
            memory: 512Mi
        envFrom:
        - configMapRef:
            name: customer-c-eu-west-config
