---
# Source: downstream/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: customer-d-us-east-config
  namespace: demo-downstream-dev
  labels:
    app.kubernetes.io/name: downstream
    app.kubernetes.io/instance: customer-d-us-east
data:
  customer-id: "crd-0004"
  customer-tier: "standard"
  region: "us-east"
  datacenter: "nyc"
  env: "dev"
  log-level: "debug"
  max-connections: "300"
  feature-advancedAnalytics: "false"
  feature-complianceMode: "standard"
  feature-lattedog: "false"
  feature-momodog: "true"
  feature-riskEngine: "v1"
---
# Source: downstream/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: customer-d-us-east
  namespace: demo-downstream-dev
  labels:
    app.kubernetes.io/name: downstream
    app.kubernetes.io/instance: customer-d-us-east
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  selector:
    app: customer-d-us-east
---
# Source: downstream/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-d-us-east
  namespace: demo-downstream-dev
  labels:
    app.kubernetes.io/name: downstream
    app.kubernetes.io/instance: customer-d-us-east
spec:
  replicas: 0
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: customer-d-us-east
  template:
    metadata:
      labels:
        app: customer-d-us-east
    spec:
      containers:
      - name: guestbook
        image: "ghcr.io/akuity/guestbook:v0.0.2"
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
        envFrom:
        - configMapRef:
            name: customer-d-us-east-config
