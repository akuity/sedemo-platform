      kind: Warehouse
      name: demo-downstream
    sources:
      stages:
      - qa
      autoPromotionOptions:
        selectionPolicy: MatchUpstream
  promotionTemplate:
    spec:
      vars:
      - name: gitRepo
        value: https://github.com/akuity/sedemo-platform
      - name: imageRepo
        value: ghcr.io/akuity/guestbook
      - name: src
        value: ./src
      steps:
      - uses: git-clone
        config:
          repoURL: ${{ vars.gitRepo }}
          checkout:
          - commit: ${{ commitFrom(vars.gitRepo).ID }}
            path: ${{ vars.src }}
      - task:
          name: render-instance
        vars:
        - name: customer
          value: customer-a
        - name: region
          value: us-east
        - name: env
          value: prod
      - uses: git-commit
        as: commit
        config:
          path: ${{ vars.src }}
          message: "downstream prod-us-east: promote ${{ imageFrom(vars.imageRepo).Tag }} [skip ci]"
      - uses: git-push
        config:
          path: ${{ vars.src }}
          targetBranch: main
      - uses: argocd-update
        config:
          apps:
          - name: downstream-customer-a-us-east-prod
            namespace: argocd

