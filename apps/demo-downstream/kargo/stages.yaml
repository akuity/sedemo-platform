apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: prod-eu-west-customer-c
  namespace: demo-downstream
  annotations:
    kargo.akuity.io/color: amber
spec:
  shard: sedemo-primary
  requestedFreight:
  - origin:
      kind: Warehouse
      name: demo-downstream
    sources:
      stages:
      - uat-customer-c
      autoPromotionOptions:
        selectionPolicy: MatchUpstream
  promotionTemplate:
    spec:
      vars:
      - name: gitRepo
        value: https://github.com/akuity/sedemo-platform
      - name: imageRepo
        value: ghcr.io/akuity/guestbook
      - name: src
        value: ./src
      steps:
      - uses: git-clone
        config:
          repoURL: ${{ vars.gitRepo }}
          checkout:
          - commit: ${{ commitFrom(vars.gitRepo).ID }}
            path: ${{ vars.src }}
      - uses: helm-template
        config:
          releaseName: customer-c-eu-west
          path: ${{ vars.src }}/apps/demo-downstream/chart
          valuesFiles:
          - ${{ vars.src }}/apps/demo-downstream/config/base/values.yaml
          - ${{ vars.src }}/apps/demo-downstream/config/regions/eu-west.yaml
          - ${{ vars.src }}/apps/demo-downstream/config/customers/customer-c.yaml
          - ${{ vars.src }}/apps/demo-downstream/config/envs/prod.yaml
          outPath: ${{ vars.src }}/apps/demo-downstream/rendered/customer-c/eu-west/prod/manifests.yaml
          namespace: demo-downstream-prod
          setValues:
          - key: image.tag
            value: ${{ imageFrom(vars.imageRepo).Tag }}
          - key: replicaCount
            value: "2"
      - uses: git-commit
        as: commit
        config:
          path: ${{ vars.src }}
          message: "downstream prod-eu-west-customer-c: promote ${{ imageFrom(vars.imageRepo).Tag }} [skip ci]"
      - uses: git-push
        config:
          path: ${{ vars.src }}
          targetBranch: main
      - uses: argocd-update
        config:
          apps:
          - name: downstream-customer-c-eu-west-prod
            namespace: argocd
