---
# ─────────────────────────────────────────────────────────────────────────────
# STAGE: staging  (convergence gate — both dev regions must pass)
# Auto-promotes once dev-us AND dev-eu have the same Freight.
# Renders representative US + EU instances to demo-downstream-staging.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: staging
  namespace: demo-downstream
  annotations:
    kargo.akuity.io/color: purple
spec:
  shard: sedemo-primary
  requestedFreight:
  - origin:
      kind: Warehouse
      name: demo-downstream
    sources:
      stages:
      - dev-us
      - dev-eu
      availabilityStrategy: All
  promotionTemplate:
    spec:
      vars:
      - name: gitRepo
        value: https://github.com/akuity/sedemo-platform
      - name: imageRepo
        value: ghcr.io/akuity/guestbook
      - name: src
        value: ./src
      steps:
      - uses: git-clone
        config:
          repoURL: ${{ vars.gitRepo }}
          checkout:
          - commit: ${{ commitFrom(vars.gitRepo).ID }}
            path: ${{ vars.src }}
      - task:
          name: render-instance
        vars:
        - name: customer
          value: customer-a
        - name: region
          value: us-east
        - name: env
          value: staging
      - task:
          name: render-instance
        vars:
        - name: customer
          value: customer-a
        - name: region
          value: eu-west
        - name: env
          value: staging
      - uses: git-commit
        as: commit
        config:
          path: ${{ vars.src }}
          message: "downstream staging: promote ${{ imageFrom(vars.imageRepo).Tag }} [skip ci]"
      - uses: git-push
        config:
          path: ${{ vars.src }}
          targetBranch: main
      - uses: argocd-update
        config:
          apps:
          - name: downstream-customer-a-us-east-staging
            namespace: argocd
          - name: downstream-customer-a-eu-west-staging
            namespace: argocd

---
# ─────────────────────────────────────────────────────────────────────────────
# STAGE: qa  (manual gate — human sign-off after staging validation)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: qa
  namespace: demo-downstream
  annotations:
    kargo.akuity.io/color: amber
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: demo-downstream
    sources:
      stages:
      - staging

---
apiVersion: kargo.akuity.io/v1alpha1
