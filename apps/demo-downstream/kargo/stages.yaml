apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev-us
  namespace: demo-downstream
  annotations:
    kargo.akuity.io/color: gray
spec:
  shard: sedemo-primary
  requestedFreight:
  - origin:
      kind: Warehouse
      name: demo-downstream
    sources:
      direct: true
  promotionTemplate:
    spec:
      vars:
      - name: gitRepo
        value: https://github.com/akuity/sedemo-platform
      - name: imageRepo
        value: ghcr.io/akuity/guestbook
      - name: src
        value: ./src
      steps:
      - uses: git-clone
        config:
          repoURL: ${{ vars.gitRepo }}
          checkout:
          - commit: ${{ commitFrom(vars.gitRepo).ID }}
            path: ${{ vars.src }}
      - task:
          name: render-instance
        vars:
        - name: customer
          value: customer-a
        - name: region
          value: us-east
        - name: env
          value: dev
      - task:
          name: render-instance
        vars:
        - name: customer
          value: customer-b
        - name: region
          value: us-east
        - name: env
          value: dev
      - task:
          name: render-instance
        vars:
        - name: customer
          value: customer-d
        - name: region
          value: us-east
        - name: env
          value: dev
      - uses: git-commit
        as: commit
        config:
          path: ${{ vars.src }}
          message: "downstream dev-us: promote ${{ imageFrom(vars.imageRepo).Tag }} [skip ci]"
      - uses: git-push
        config:
          path: ${{ vars.src }}
          targetBranch: main
      - uses: argocd-update
        config:
          apps:
          - name: downstream-customer-a-us-east-dev
            namespace: argocd
          - name: downstream-customer-b-us-east-dev
            namespace: argocd
          - name: downstream-customer-d-us-east-dev
            namespace: argocd

