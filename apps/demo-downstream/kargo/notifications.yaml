apiVersion: ee.kargo.akuity.io/v1alpha1
kind: MessageChannel
metadata:
  name: kargo-notification
  namespace: demo-downstream
spec:
  secretRef:
    name: slack-token
  slack:
    channelID: C0A8YDED6BU
---
kind: EventRouter
apiVersion: ee.kargo.akuity.io/v1alpha1
metadata:
  name: promotion-status
  namespace: demo-downstream
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  types:
    - PromotionFailed
    - PromotionErrored
  channels:
    - name: kargo-notification
      kind: MessageChannel
