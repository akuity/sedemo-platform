# kind: EventRouter
# apiVersion: ee.kargo.akuity.io/v1alpha1
# metadata:
#   name: promotion-status
#   namespace: demo-downstream
#   annotations:
#     argocd.argoproj.io/sync-wave: "1"
# spec:
#   types:
#     - PromotionFailed
#     - PromotionErrored
#     - PromotionSucceeded
#     - PromotionCreated
#   channels:
#     - name: kargo-notification
#       kind: ClusterMessageChannel
---
kind: EventRouter
apiVersion: ee.kargo.akuity.io/v1alpha1
metadata:
  name: verification-status
  namespace: demo-downstream
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  types:
    - FreightVerificationFailed
    - FreightVerificationErrored
  channels:
    - name: kargo-notification
      kind: ClusterMessageChannel
      output: ":x: *${{ type }}*\nStage: *${{ event.stageName }}*  |  Project: `${{ event.project }}`\nAnalysis run: `${{ event.analysisRunName }}`\nCommit: <${{ event.commits[0].repoURL }}/commit/${{ event.commits[0].id }}|${{ event.commits[0].id[:7] }}>\n<${{ ctx.uiBaseURL }}/project/${{ event.project }}|View in Kargo>"
