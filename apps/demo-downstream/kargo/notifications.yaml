kind: EventRouter
apiVersion: ee.kargo.akuity.io/v1alpha1
metadata:
  name: promotion-status
  namespace: demo-downstream
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  types:
    - PromotionFailed
    - PromotionErrored
    - PromotionSucceeded
    - PromotionCreated
  channels:
    - name: kargo-notification
      kind: ClusterMessageChannel
