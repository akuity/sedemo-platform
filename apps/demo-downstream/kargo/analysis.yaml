apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: e2e-verification
  namespace: demo-downstream
spec:
  metrics:
  - name: test
    provider:
      job:
        spec:
          backoffLimit: 1
          template:
            spec:
              restartPolicy: Never
              containers:
              - name: test
                image: alpine:latest
                command:
                - /bin/sh
                - -c
                args:
                - 'for i in $(seq 1 5); do echo "Verification Step $i of 5"; sleep 2; if [ $i -eq 4 ]; then echo -e "\tFAIL - assertion error: unexpected response code"; exit 1; else echo -e "\tPASS"; fi; done'
