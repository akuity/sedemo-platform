apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: team-eddie
  namespace: argocd
spec:
  generators:
  - matrix:
     generators:
      - list:
          elements:
            - stage: dev
            - stage: staging
            - stage: prod
      - clusters:
          selector:
            matchLabels:
              argocd.argoproj.io/secret-type: cluster
  template:
    metadata:
      name: team-eddie-{{stage}}-{{clusters.metadata.name}}
      annotations:
        kargo.akuity.io/authorized-stage: team-eddie:{{stage}}-primary,team-eddie:{{stage}}-secondary
    spec:
      project: team-eddie
      source:
        repoURL: https://github.com/akuity/sedemo-monorepo
        targetRevision: env-eddie/{{stage}}/{{clusters.metadata.name}}
        path: .
      destination:
        name: {{clusters.metadata.name}}
        namespace: team-eddie-{{stage}}
      syncPolicy:
        automated:
          prune: true
          enabled: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true