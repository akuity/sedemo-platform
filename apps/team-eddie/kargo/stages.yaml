


apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: validate-inputs
  namespace: team-eddie
  annotations:
    kargo.akuity.io/color: yellow
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: application-a
    sources:
      direct: true
  promotionTemplate:
    spec:
      steps:
      - uses: gha-dispatch-workflow
        as: verify-inputs-gha-workflow
        config:
          repoURL: https://github.com/akuity/sedemo-platform
          workflowFile: team-eddie-validate-inputs.yaml  
          ref: main
          inputs:
            project: "${{ ctx.project }}"
            actor: "${{ ctx.meta.promotion.actor}}"
          timeout: 120
          insecureSkipTLSVerify: false
      - uses: gha-wait-for-workflow
        config:
          repoURL: https://github.com/akuity/sedemo-platform
          runID: "${{ outputs['verify-inputs-gha-workflow'].runID }}"
          expectedConclusion: success
          insecureSkipTLSVerify: false
---
# This stage uses Kargo's AnalysisTemplate support to run functional tests as a verification step in the promotion process.
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev-primary
  namespace: team-eddie
  annotations:
    kargo.akuity.io/color: green
spec:
  verification:
    analysisTemplates:
    - name: functional-tests
  requestedFreight:
  - origin:
      kind: Warehouse
      name: application-a
    sources:
      stages:
      - validate-inputs
      autoPromotionOptions:
        selectionPolicy: MatchUpstream
  promotionTemplate:
    spec:
      vars:
      - name: gitRepo
        value: https://github.com/akuity/sedemo-monorepo
      - name: path_src
        value: ./src
      - name: path_out
        value: ./out
      - name: path_info
        value: ./info
      - name: imageRepo
        value: ghcr.io/akuity/sedemo-monorepo-rollouts-app
      steps:
      # use http step to pull https://demo-public-notsecure.s3.us-east-1.amazonaws.com/environments.yaml
      # Alternately authorative file could be cloned from git, and then parsed with yaml-parse step 
      - uses: http
        as: find-primary
        config:
          url: https://demo-public-notsecure.s3.us-east-1.amazonaws.com/environments.yaml
          method: GET
          outputs:
          - name: primaryCluster
            fromExpression: response.body.dev.primary.cluster
      - uses: gha-dispatch-workflow
        as: verify-environment-gha-workflow
        config:
          repoURL: https://github.com/akuity/sedemo-platform
          workflowFile: team-eddie-validate-env.yaml  
          ref: main
          inputs:
            environment: "${{ ctx.stage }}"
            version: "${{ imageFrom(vars.imageRepo).Tag }}"
          timeout: 120
          insecureSkipTLSVerify: false
      - uses: gha-wait-for-workflow
        config:
          repoURL: https://github.com/akuity/sedemo-platform
          runID: "${{ outputs['verify-environment-gha-workflow'].runID }}"
          expectedConclusion: success
          insecureSkipTLSVerify: false
      - uses: git-clone
        config:
          repoURL: ${{ vars.gitRepo }}
          checkout:
          - branch: main
            path: ${{ vars.path_src }}
          - branch: env-eddie/dev/${{ outputs['find-primary'].primaryCluster }}
            create: true
            path: ${{ vars.path_out }}
      - uses: git-clear
        config:
          path: ${{ vars.path_out }}
      # use output in helm template step to generate k8s manifests for promotion
      - uses: helm-template
        config:
          releaseName: deploy
          path: ${{ vars.path_src }}/rollouts-app/deploy/chart
          valuesFiles:
          - ${{ vars.path_src }}/rollouts-app/deploy/chart/values.yaml
          outPath: ${{ vars.path_out }}/${{ outputs['find-primary'].primaryCluster }}/manifests
          namespace: team-eddie-dev
          setValues:
            - key: image.tag
              value: ${{ imageFrom(vars.imageRepo).Tag }}
            - key: kargo.stage
              value: ${{ ctx.stage }}
            - key: ingress.root_domain
              value: akpdemoapps.link
            - key: destinationCluster
              value: ${{ outputs['find-primary'].primaryCluster }}
          outLayout: flat
      - uses: git-commit
        as: commit
        config:
          path: ${{ vars.path_out }}
          message: "Promote ${{ imageFrom(vars.imageRepo).Tag }} to ${{ ctx.stage }} [skip ci]"
      - uses: git-push
        as: push
        config:
          path: ${{ vars.path_out }}
          targetBranch: env-eddie/dev/${{ outputs['find-primary'].primaryCluster }}
      # Now two conditional argocd-update steps to deploy the primary, using a conditional if
      - uses: argocd-update
        as: deploy-cluster-a
        if: ${{ outputs['find-primary'].primaryCluster  == "cluster-a" }}
        config:
          apps:
          - name: team-eddie-dev-cluster-a
      - uses: argocd-update
        as: deploy-cluster-b
        if: ${{ outputs['find-primary'].primaryCluster  == "cluster-b" }}
        config:
          apps:
          - name: team-eddie-dev-cluster-b
---
# This stage uses GHA to act as the functional test verification step, demonstrating Kargo's support for using any external system as part of the promotion process.
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev-secondary
  namespace: team-eddie
  annotations:
    kargo.akuity.io/color: green
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: application-a
    sources:
      stages:
      - dev-primary
      requiredSoakTime: 2m0s
      autoPromotionOptions:
        selectionPolicy: MatchUpstream
  promotionTemplate:
    spec:
      vars:
      - name: gitRepo
        value: https://github.com/akuity/sedemo-monorepo
      - name: path_src
        value: ./src
      - name: path_out
        value: ./out
      - name: path_info
        value: ./info
      - name: imageRepo
        value: ghcr.io/akuity/sedemo-monorepo-rollouts-app
      steps:
      # use http step to pull https://demo-public-notsecure.s3.us-east-1.amazonaws.com/environments.yaml
      - uses: http
        as: find-secondary
        config:
          url: https://demo-public-notsecure.s3.us-east-1.amazonaws.com/environments.yaml
          method: GET
          outputs:
          - name: secondaryCluster
            fromExpression: response.body.dev.secondary.cluster
      #
      # Alternately authorative file could be cloned from git, and then parsed with yaml-parse step to get current primary
      #
      - uses: git-clone
        config:
          repoURL: ${{ vars.gitRepo }}
          checkout:
          - branch: main
            path: ${{ vars.path_src }}
          - branch: env-eddie/dev/${{ outputs['find-secondary'].secondaryCluster }}
            create: true
            path: ${{ vars.path_out }}
      - uses: git-clear
        config:
          path: ${{ vars.path_out }}
      # use output in helm template step to generate k8s manifests for promotion
      - uses: helm-template
        config:
          releaseName: deploy
          path: ${{ vars.path_src }}/rollouts-app/deploy/chart
          valuesFiles:
          - ${{ vars.path_src }}/rollouts-app/deploy/chart/values.yaml
          outPath: ${{ vars.path_out }}/${{ outputs['find-secondary'].secondaryCluster }}/manifests
          namespace: team-eddie-dev
          setValues:
            - key: image.tag
              value: ${{ imageFrom(vars.imageRepo).Tag }}
            - key: kargo.stage
              value: ${{ ctx.stage }}
            - key: ingress.root_domain
              value: akpdemoapps.link
            - key: destinationCluster
              value: ${{ outputs['find-secondary'].secondaryCluster }}
          outLayout: flat
      - uses: git-commit
        as: commit
        config:
          path: ${{ vars.path_out }}
          message: "Promote ${{ imageFrom(vars.imageRepo).Tag }} to ${{ ctx.stage }} [skip ci]"
      - uses: git-push
        as: push
        config:
          path: ${{ vars.path_out }}
          targetBranch: env-eddie/dev/${{ outputs['find-secondary'].secondaryCluster }}
      # Now two conditional argocd-update steps to deploy the secondary, using a conditional if
      - uses: argocd-update
        as: deploy-cluster-a
        if: ${{ outputs['find-secondary'].secondaryCluster  == "cluster-a" }}
        config:
          apps:
          - name: team-eddie-dev-cluster-a
      - uses: argocd-update
        as: deploy-cluster-b
        if: ${{ outputs['find-secondary'].secondaryCluster  == "cluster-b" }}
        config:
          apps:
          - name: team-eddie-dev-cluster-b
      - uses: argocd-wait
        if: ${{ outputs['find-secondary'].secondaryCluster  == "cluster-a" }}
        config:
          apps:
          - name: team-eddie-dev-cluster-a
      - uses: argocd-wait
        if: ${{ outputs['find-secondary'].secondaryCluster  == "cluster-b" }}
        config:
          apps:
          - name: team-eddie-dev-cluster-b
      - uses: gha-dispatch-workflow
        as: run-functional-tests
        config:
          repoURL: https://github.com/akuity/sedemo-platform
          workflowFile: team-eddie-functional-tests.yaml  
          ref: main
          inputs:
            path: "./tests_dir"
          timeout: 120
          insecureSkipTLSVerify: false
      - uses: gha-wait-for-workflow
        config:
          repoURL: https://github.com/akuity/sedemo-platform
          runID: "${{ outputs['run-functional-tests'].runID }}"
          expectedConclusion: success
          insecureSkipTLSVerify: false

---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: summarize-deployment-dev
  namespace: team-eddie
  annotations:
    kargo.akuity.io/color: gray
spec:
  requestedFreight:
  - origin:
      kind: Warehouse     
      name: application-a
    sources:
      stages:
      - dev-secondary
      autoPromotionOptions:
        selectionPolicy: MatchUpstream
  promotionTemplate:
    spec:
      vars:
        - name: gitRepo
          value: https://github.com/akuity/sedemo-monorepo
        - name: path_src
          value: ./src
        - name: path_out
          value: ./out
        - name: path_info
          value: ./info
        - name: imageRepo
          value: ghcr.io/akuity/sedemo-monorepo-rollouts-app
      steps:
      - as: allure-report
        uses: allure-report
        config:
          input_a: 'some-value'
          transform:
            failure-count: output.failure_count
            failed: output.failure_count > 5
            status: output.status
      - uses: set-metadata
        config:
        - kind: Freight
          name: ${{ ctx.targetFreight.name }}
          values:
            dev-functional-test-failures: "${{ outputs['allure-report'].failure-count }}"
            dev-functional-test-status: "${{ outputs['allure-report'].status }}"
      - uses: jira
        as: create-change-ticket
        config:
          credentials:
            sharedSecretName: jira-access-secret
          createIssue:
            projectKey: CHANGE
            summary: "Promotion of ${{ imageFrom(vars.imageRepo).Tag }} to Dev environments"
            adfDescription:
              type: doc
              version: 1
              content:
              - type: heading
                attrs:
                  level: 3
                content:
                - type: text
                  text: "Promotion: ${{ ctx.stage }},  "
                - type: text
                  text: "${{ imageFrom(vars.imageRepo).Tag }}"
                  marks:
                  - type: code
              - type: paragraph
                content:
                - type: text
                  text: "Promotion ID: "
                  marks:
                  - type: strong
                - type: text
                  text: ${{ ctx.promotion }}
                  marks:
                  - type: link
                    attrs:
                      href: "https://kargo.akpdemoapps.link/project/team-eddie/promotion/${{ ctx.promotion }}"
              - type: paragraph
                content:
                - type: text
                  text: "Freight ID: "
                  marks:
                  - type: strong
                - type: text
                  text: ${{ ctx.targetFreight.name }}
                  marks:
                  - type: link
                    attrs:
                      href: "https://kargo.akpdemoapps.link/project/team-eddie/freight/${{ ctx.targetFreight.name }}"
            issueType: task
            #customFields:
              #customfield_11301: Standard
              #customfield_10800: Request a change
            labels:
            - promotion
            - "${{ ctx.stage }}"
            - "release-${{ imageFrom(vars.imageRepo).Tag }}"