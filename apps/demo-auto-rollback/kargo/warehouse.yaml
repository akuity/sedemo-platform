apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: demo-auto-rollback
  namespace: demo-auto-rollback
spec:
  subscriptions:
  - image:
      repoURL: argoproj/rollouts-demo
      discoveryLimit: 5
      imageSelectionStrategy: Digest
      allowTagsRegexes: 
      - ^[a-z]*-yellow$
      cacheByTag: true
  - git:
      repoURL: https://github.com/akuity/sedemo-monorepo
      includePaths:
      - rollouts-app