apiVersion: kargo.akuity.io/v1alpha1
kind: Project
metadata:
  name: demo-auto-rollback
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
---
apiVersion: kargo.akuity.io/v1alpha1
kind: ProjectConfig
metadata:
  name: demo-auto-rollback
  namespace: demo-auto-rollback
spec:
  promotionPolicies:
  - stageSelector:
      name: "regex:prod.*"
    autoPromotionEnabled: true
    autoRollback: {}