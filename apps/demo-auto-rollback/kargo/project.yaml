apiVersion: kargo.akuity.io/v1alpha1
kind: Project
metadata:
  name: demo-auto-rollback
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
---
apiVersion: kargo.akuity.io/v1alpha1
kind: ProjectConfig
metadata:
  name: demo-auto-rollback
  namespace: demo-auto-rollback
spec:
  stageLinks:
    - title: App UI
      description: Rollouts demo app; the error dial here drives the auto-rollback beat
      url: 'http://demo-rollbacks-{{ .stage.metadata.name }}.akpdemoapps.link/'
    - title: Error Rate
      description: The exact Prometheus signal the verification gate evaluates
      url: 'https://prometheus.akpdemoapps.link/query?g0.expr=%28+sum%28rate%28nginx_ingress_controller_requests%7Bnamespace%3D%22demo-rollbacks-{{ .stage.metadata.name }}%22%2Cstatus%3D%22200%22%7D%5B30s%5D%29%29+%2B+1+%29%0A%2F%0A%28+sum%28rate%28nginx_ingress_controller_requests%7Bnamespace%3D%22demo-rollbacks-{{ .stage.metadata.name }}%22%7D%5B30s%5D%29%29+%2B+1+%29&g0.show_tree=0&g0.tab=graph&g0.range_input=1h&g0.res_type=auto&g0.res_density=medium&g0.display_mode=lines&g0.show_exemplars=0'
      if: stage.metadata.name in ["prod-amer-west", "prod-amer-east"]
  promotionPolicies:
  - stageSelector:
      name: "prod-amer-west"
    autoPromotionEnabled: true
    autoRollback: 
      onPromotion:
        - Failed
        - Errored
      onVerification:
        - Failed
        - Error
  - stageSelector:
      name: "prod-amer-east"
    autoPromotionEnabled: true
    autoRollback: 
      onPromotion:
        - Failed
        - Errored
      onVerification:
        - Failed
        - Error