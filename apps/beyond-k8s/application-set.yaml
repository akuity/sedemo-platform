apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: beyond-k8s
  namespace: argocd
spec:
  generators:
  - list:
      elements:
      - stage: dev
      - stage: staging-a
      - stage: staing-b
      - stage: prod
  template:
    metadata:
      name: beyond-k8s-{{stage}}
      annotations:
        kargo.akuity.io/authorized-stage: beyond-k8s:{{stage}}
        notifications.argoproj.io/subscriptions: |
          - trigger: [on-sync-succeeded, on-sync-running]
            destinations:
              - service: sedemo
                recipients: [argo-notifications]
    spec:
      project: default
      source:
        repoURL: https://github.com/akuity/sedemo-monorepo
        targetRevision: env-beyond-k8s/{{stage}}
        path: .
      destination:
        name: sedemo-primary
        namespace: beyond-k8s-{{stage}}
      syncPolicy:
        automated:
          prune: true
          enabled: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true