apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: beyond-k8s
  namespace: argocd
spec:
  generators:
  - list:
      elements:
      - stage: dev
      - stage: staging-a
      - stage: staing-b
      - stage: prod
  template:
    metadata:
      name: beyond-k8s-{{stage}}
      annotations:
        kargo.akuity.io/authorized-stage: beyond-k8s:{{stage}}
    spec:
      project: default
      source:
        path: beyond-k8s/charts/guestbook
        repoURL: https://github.com/akuity/sedemo-monorepo
        helm:
          valueFiles:
          - "/beyond-k8s/env/{{path.basename}}/k8s/values.yaml"
      destination:
        name: sedemo-primary
        namespace: beyond-k8s-{{stage}}
      syncPolicy:
        automated:
          prune: true
          enabled: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true