# DB credential for the flyway-migrate promotion step
# (apps/demo-db-rollback-routing), referenced in promotions via
# ${{ secret("flyway-db")["password"] }}.
#
# Sourced from AWS Secrets Manager key `kargo-flyway-db` (properties:
# username, password). The password must match db.password in the app's chart
# values, since it also provisions the throwaway per-stage Postgres.
#
# Delivery path matters:
# - Kargo's admission webhook denies the GitOps service account writing
#   Secrets into project namespaces, so the secret-sync label makes the agent
#   push the ESO-created Secret from the akuity namespace on sedemo-primary
#   into kargo-shared-resources, same as every other secret here.
# - Promotions read it with sharedSecret("flyway-db"), NOT secret(): secret()
#   only resolves the project's own namespace (and returns an empty map when
#   nothing is there); sharedSecret() reads the shared namespace and requires
#   the cred-type: generic label.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: flyway-db
  namespace: akuity
spec:
  refreshInterval: 1h
  # our actual secret store is in EKS cluster default NS
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: flyway-db
    template:
      metadata:
        labels:
          kargo.akuity.io/secret-sync: kargo-shared-resources
          kargo.akuity.io/cred-type: generic
      engineVersion: v2
      data:
        username: "{{.username}}"
        password: "{{.password}}"
  data:
  - secretKey: username
    remoteRef:
      key: kargo-flyway-db
      property: username
  - secretKey: password
    remoteRef:
      key: kargo-flyway-db
      property: password
