# DB credential for the flyway-migrate promotion step
# (apps/demo-db-rollback-routing), referenced in promotions via
# ${{ secret("flyway-db")["password"] }}.
#
# A plain Secret rather than an ExternalSecret on purpose: this is a
# demo-grade credential for throwaway in-cluster Postgres instances, and the
# same value is already public in the app's chart values. A real database
# credential would be an ExternalSecret backed by AWS Secrets Manager like
# everything else in this directory.
#
# Delivery path matters: Kargo's admission webhook denies the GitOps service
# account writing Secrets into project namespaces directly. The secret-sync
# label makes the Kargo agent push this from the akuity namespace on
# sedemo-primary into the shared credentials namespace instead.
apiVersion: v1
kind: Secret
metadata:
  name: flyway-db
  namespace: akuity
  labels:
    kargo.akuity.io/secret-sync: kargo-shared-resources
    kargo.akuity.io/cred-type: generic
stringData:
  username: app
  password: kargodemo1
