
# ArgoCD OCI repository credentials for oci-airgap ApplicationSet.
# Allows ArgoCD repo-server to pull from ghcr.io/akuity/oci-airgap-bundles.
# Reuses the same PAT stored in kargo-pats that the oci-airgap-registry kargo secret uses.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oci-airgap-argocd-repo
  namespace: akuity
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: oci-airgap-argocd-repo
    template:
      engineVersion: v2
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
          akuity.io/secret-sync: "true"
      data:
        type: helm
        enableOCI: "true"
        url: oci://ghcr.io/akuity/oci-airgap-bundles
        username: "{{.username}}"
        password: "{{.password}}"
  data:
  - secretKey: username
    remoteRef:
      key: kargo-pats
      property: oci-airgap-username
  - secretKey: password
    remoteRef:
      key: kargo-pats
      property: oci-airgap-pat
---
