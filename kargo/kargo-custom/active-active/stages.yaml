apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: close
  namespace: active-active
  annotations:
    kargo.akuity.io/color: green
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: active-active
    sources:
      stages: 
        - prod-west
      requiredSoakTime: 1m0s
      autoPromotionOptions:
        selectionPolicy: MatchUpstream
  promotionTemplate:
    spec:
      steps:
      - as: snowupdate
        config:
          credentials:
            sharedSecretName: kargo-step-snow
            type: api-token
          parameters:
            state: "Close"
            work_notes: "Promotion to prod successful, moving change request to Close state."
            close_notes: "Promotion to prod successful, moving change request to Close state."
            close_code: "Successful"
          tableName: change_request
          ticketId: ${{ stageMetadata('approve')['snow-id'] }}
        uses: snow-update



