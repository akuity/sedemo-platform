apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: active-active
  namespace: active-active
spec:
  subscriptions:
  - image:
      repoURL: ghcr.io/akuity/sedemo-monorepo-active-active
      discoveryLimit: 5
      imageSelectionStrategy: NewestBuild
      allowTags: ^\d*-[a-z]*$
  - git:
      repoURL: https://github.com/akuity/sedemo-monorepo
      includePaths:
      - active-active/*
      excludePaths:
      - active-active/targets/*