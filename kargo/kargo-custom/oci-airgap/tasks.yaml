# PromotionTask: render-and-push-oci
#
# Used by the `dev` stage only.
#
# Pipeline:
#   1. Clone platform repo (main → ./src)
#   2. kustomize-set-image on the shared base (updates all 4 overlays in one shot)
#   3. kustomize-build each overlay to ./bundle/<env>/manifests.yaml
#   4. oras-push  → packages ./bundle as a single tar+gzip OCI layer
#      (media type: application/vnd.cncf.argoproj.argocd.content.v1.tar+gzip)
#      so Argo CD can sync directly from OCI — no rendered git branch needed.
#   5. argocd-update  → sets targetRevision + path on the dev Argo CD Application
#
# Downstream stages (test, stage) consume the same artifact via argocd-update only.
# Prod ops mirror it into the airgapped registry; the in-cluster Argo CD syncs there.
apiVersion: kargo.akuity.io/v1alpha1
kind: PromotionTask
metadata:
  name: render-and-push-oci
  namespace: oci-airgap
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  vars:
  - name: gitRepo
  - name: imageRepo
  - name: bundleRegistry
  - name: bundleRepo
  steps:
  # ── Git checkout ────────────────────────────────────────────────────────────
  # Only the source branch is needed — no rendered branch, no git output.
  - uses: git-clone
    config:
      repoURL: ${{ vars.gitRepo }}
      checkout:
      - branch: main
        path: ./src

  # ── Stamp image tag into the shared base kustomization ──────────────────────
  # Running kustomize-set-image once on the base means all four overlays
  # (which reference ../../base) pick up the new tag automatically.
  - uses: kustomize-set-image
    as: update-image
    config:
      path: ./src/apps/oci-airgap/base
      images:
      - image: ${{ vars.imageRepo }}
        tag: ${{ imageFrom(vars.imageRepo).Tag }}

  # ── Render every overlay into a per-env subdirectory ─────────────────────────
  # ./bundle/<env>/manifests.yaml becomes a path-addressable entry in the OCI
  # artifact. Argo CD Applications select their env via `source.path: <env>`.
  - uses: kustomize-build
    as: build-dev
    config:
      path: ./src/apps/oci-airgap/overlays/dev
      outPath: ./bundle/dev/manifests.yaml

  - uses: kustomize-build
    as: build-test
    config:
      path: ./src/apps/oci-airgap/overlays/test
      outPath: ./bundle/test/manifests.yaml

  - uses: kustomize-build
    as: build-stage
    config:
      path: ./src/apps/oci-airgap/overlays/stage
      outPath: ./bundle/stage/manifests.yaml

  - uses: kustomize-build
    as: build-prod
    config:
      path: ./src/apps/oci-airgap/overlays/prod
      outPath: ./bundle/prod/manifests.yaml

  # ── Push ./bundle as a single OCI layer ──────────────────────────────────────
  # The step packages ./bundle into a tar+gzip and pushes it with the Argo CD
  # native media type so the repo-server can expand and sync directly by path.
  - uses: oras-push
    as: push-oci
    config:
      registry: ${{ vars.bundleRegistry }}
      repository: ${{ vars.bundleRepo }}
      tag: ${{ imageFrom(vars.imageRepo).Tag }}
      path: ./bundle
      mediaType: application/vnd.oci.image.layer.v1.tar+gzip
      orasUsername: ${% sharedSecret('oci-airgap-registry').username %}
      orasPassword: ${% sharedSecret('oci-airgap-registry').password %}

  # ── Resolve digest from the just-pushed tag ───────────────────────────────────
  # ArgoCD stores the digest (not the tag) in sync status for OCI sources.
  # Kargo's argocd-update health check must use the digest as desiredRevision
  # or it will wait forever for a revision match that never comes.
  - as: resolve-digest
    uses: oras-resolve
    config:
      registry: ${{ vars.bundleRegistry }}
      repository: ${{ vars.bundleRepo }}
      tag: ${{ imageFrom(vars.imageRepo).Tag }}
      orasUsername: ${% sharedSecret('oci-airgap-registry').username %}
      orasPassword: ${% sharedSecret('oci-airgap-registry').password %}

  # ── Trigger Argo CD sync from OCI ────────────────────────────────────────────
  - uses: argocd-update
    config:
      apps:
      - name: oci-airgap-dev
        sources:
        - repoURL: oci://${{ vars.bundleRegistry }}/${{ vars.bundleRepo }}
          desiredRevision: ${{ task.outputs['resolve-digest'].digest }}
          updateTargetRevision: true
---
# PromotionTask: pull-and-apply-oci
#
# Used by the `test` and `stage` stages.
#
# The OCI artifact was already packaged at dev time with all four env overlays
# under ./bundle/<env>/manifests.yaml. Promotion here is just telling Argo CD
# to sync the promoted tag from the correct env path — no oras-pull, no git.
apiVersion: kargo.akuity.io/v1alpha1
kind: PromotionTask
metadata:
  name: pull-and-apply-oci
  namespace: oci-airgap
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  vars:
  - name: imageRepo
  - name: bundleRegistry
  - name: bundleRepo
  steps:
  # ── Point Argo CD at the promoted tag and trigger sync ────────────────────────
  # path: <stage> selects the env-specific subdirectory inside the OCI artifact.
  # Resolve the digest for the promoted tag so Kargo can match against ArgoCD's
  # digest-based sync status. ORAS image stores digest in stdout after manifest fetch.
  - as: resolve-digest
    uses: oras-resolve
    config:
      registry: ${{ vars.bundleRegistry }}
      repository: ${{ vars.bundleRepo }}
      tag: ${{ imageFrom(vars.imageRepo).Tag }}
      orasUsername: ${% sharedSecret('oci-airgap-registry').username %}
      orasPassword: ${% sharedSecret('oci-airgap-registry').password %}

  - uses: argocd-update
    config:
      apps:
      - name: oci-airgap-${{ ctx.stage }}
        sources:
        - repoURL: oci://${{ vars.bundleRegistry }}/${{ vars.bundleRepo }}
          desiredRevision: ${{ task.outputs['resolve-digest'].digest }}
          updateTargetRevision: true
---
# PromotionTask: airgap-prod-gate
#
# Used by the `prod` stage.
#
# Prod is airgapped but has its own Argo CD instance pointing at an internal
# mirror registry. The OCI artifact must be transferred from the connected
# registry to the airgapped registry via approved procedures — Argo CD in the
# airgapped cluster then syncs automatically once the tag is available.
#
# This task:
#   1. Creates a ServiceNow change request with exact mirror instructions.
#   2. Waits for the ticket to reach state=3 (Closed) — proof the ops team has
#      completed the transfer and Argo CD has synced successfully.
#   3. Updates the ticket with a closing note.
#
# The ops team's workflow (out of band):
#   a. Export: skopeo copy docker://<registry>/<repo>:<tag>
#                oci-archive:./bundle.tar
#   b. Transfer ./bundle.tar via approved data-diode / physical media
#   c. Import: skopeo copy oci-archive:./bundle.tar
#                docker://INTERNAL_REGISTRY/<repo>:<tag>
#   d. Argo CD in the airgapped cluster syncs automatically from the internal registry
#   e. Verify deployment and close the ServiceNow ticket → Kargo marks stage Succeeded
apiVersion: kargo.akuity.io/v1alpha1
kind: PromotionTask
metadata:
  name: airgap-prod-gate
  namespace: oci-airgap
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  vars:
  - name: imageRepo
  - name: bundleRegistry
  - name: bundleRepo
  steps:
  # ── Open a change request in ServiceNow ──────────────────────────────────────
  - as: snowcreate
    uses: snow-create
    config:
      credentials:
        sharedSecretName: kargo-step-snow
        type: api-token
      tableName: change_request
      template:
        type: normal
      parameters:
        short_description: >-
          Airgap Prod Deployment — oci-airgap ${{ imageFrom(vars.imageRepo).Tag }}
        description: |
          Mirror the OCI artifact into the airgapped registry so the in-cluster
          Argo CD can sync automatically. No manual kubectl apply required.

          ── OCI Bundle ──────────────────────────────────────────────────────────
          Registry:  ${{ vars.bundleRegistry }}/${{ vars.bundleRepo }}
          Tag:       ${{ imageFrom(vars.imageRepo).Tag }}

          ── Operator Steps ──────────────────────────────────────────────────────
          1. On a network-connected machine, export the artifact to a tar archive:
               skopeo copy \
                 docker://${{ vars.bundleRegistry }}/${{ vars.bundleRepo }}:${{ imageFrom(vars.imageRepo).Tag }} \
                 oci-archive:./oci-airgap-${{ imageFrom(vars.imageRepo).Tag }}.tar

          2. Transfer ./oci-airgap-${{ imageFrom(vars.imageRepo).Tag }}.tar
             to the airgapped environment via the approved data-diode or
             physical media procedure.

          3. In the airgapped environment, import into the internal registry:
               skopeo copy \
                 oci-archive:./oci-airgap-${{ imageFrom(vars.imageRepo).Tag }}.tar \
                 docker://INTERNAL_REGISTRY/${{ vars.bundleRepo }}:${{ imageFrom(vars.imageRepo).Tag }}

          4. Argo CD in the airgapped cluster will sync automatically once the
             tag is available. Verify the deployment is healthy:
               argocd app get oci-airgap-prod --refresh
               argocd app wait oci-airgap-prod --health

          5. Close this ticket — Kargo will then mark the prod stage as Succeeded.

          ── Kargo Context ────────────────────────────────────────────────────────
          Promotion:  ${{ ctx.promotion }}
          Freight:    ${{ ctx.targetFreight.name }}
          Image:      ${{ imageFrom(vars.imageRepo).RepoURL }}:${{ imageFrom(vars.imageRepo).Tag }}
        assignment_group: "Platform Operations"
        impact: "2"
        urgency: "3"
        implementation_plan: >-
          See Kargo promotion at
          https://kargo.akpdemoapps.link/project/oci-airgap/promotion/${{ ctx.promotion }}

  # ── Wait for the ticket to be closed by the ops team ─────────────────────────
  # state=3 is "Closed" in the default ServiceNow ITSM workflow.
  # Kargo polls on the configured interval until the condition is met.
  - as: snow-wait-for-closed
    uses: snow-wait-for-condition
    config:
      credentials:
        sharedSecretName: kargo-step-snow
        type: api-token
      tableName: change_request
      ticketId: ${% task.outputs['snowcreate'].sys_id %}
      condition: state=3

  # ── Record completion on the ticket ──────────────────────────────────────────
  - as: snow-update
    uses: snow-update
    config:
      credentials:
        sharedSecretName: kargo-step-snow
        type: api-token
      tableName: change_request
      ticketId: ${% task.outputs['snowcreate'].sys_id %}
      parameters:
        work_notes: >-
          Airgapped deployment confirmed by ops team.
          Kargo has marked the prod stage as Succeeded for freight
          ${{ ctx.targetFreight.name }} (image ${{ imageFrom(vars.imageRepo).Tag }}).
        state: "Closed Complete"
