apiVersion: kargo.akuity.io/v1alpha1
kind: Project
metadata:
  name: beyond-k8s
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
---
apiVersion: kargo.akuity.io/v1alpha1
kind: ProjectConfig
metadata:
  name: beyond-k8s
  namespace: beyond-k8s
spec:
  promotionPolicies:
  - stageSelector:
      name: "dev"
    autoPromotionEnabled: true
  - stageSelector:
      name: "regex:staging-.*"
    autoPromotionEnabled: true
  - stageSelector:
      name: "prod"
    autoPromotionEnabled: true