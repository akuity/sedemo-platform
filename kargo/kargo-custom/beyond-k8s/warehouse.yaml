apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: beyond-k8s
  namespace: beyond-k8s
spec:
  subscriptions:
  - image:
      repoURL: ghcr.io/akuity/sedemo-monorepo-beyond-k8s
      discoveryLimit: 5
      imageSelectionStrategy: NewestBuild
      allowTags: ^\d*-[a-z]*$
  - git:
      repoURL: https://github.com/akuity/sedemo-monorepo
      includePaths:
      - beyond-k8s